<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI-r1 · Frattali</title>
<link rel="stylesheet" href="/campovasto/fonts/jetbrains-mono.css">
<style>
  /* Colori/token: fonte unica = js/theme.js. Le tinte dei trigrammi e delle
     relazioni vengono da TRIG_COLORS (theme.js); il chrome dalle var iniettate.
     Nessun hex letterale qui. Pagina VIEWER (lente 3D sul KG) — niente edit. */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--color-bg); color: var(--color-text);
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
  }
  #universe-3d { position: fixed; inset: 0; }

  .overlay {
    position: absolute; background: var(--pannello-sfondo);
    border: 1px solid var(--color-border); border-radius: 8px;
    padding: 10px 12px; backdrop-filter: blur(4px);
  }
  #universe-info { top: 12px; left: 12px; min-width: 200px; max-width: 260px; max-height: calc(100vh - 24px); overflow-y: auto; }
  #universe-info .hint { font-size: 12px; color: var(--color-text-dim); }
  #universe-stats { top: 12px; right: 12px; text-align: right; }
  #universe-stats .lbl { font-size: 12px; color: var(--color-text-dim); letter-spacing: 1px; }
  #universe-stats .big { font-size: 20px; font-weight: 700; color: var(--c-accent); }
  #universe-stats .sub { font-size: 12px; color: var(--color-text-dim); }
  #universe-stats .locus { font-size: 13px; color: var(--c-locus); font-weight: 600; }

  .searchbar { position: absolute; bottom: 14px; left: 14px; display: flex; gap: 6px; }
  .searchbar input {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 6px; padding: 6px 10px; color: var(--color-text);
    font-family: inherit; font-size: 13px; width: 180px; outline: none;
  }
  .searchbar button {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 6px; padding: 6px 12px; color: var(--color-text);
    font-family: inherit; cursor: pointer; transition: var(--transition-smooth);
  }
  .searchbar button:hover { border-color: var(--bordo-hover); }
  .hint-controls { position: absolute; bottom: 16px; right: 16px; font-size: 12px; color: var(--testo-tenue); letter-spacing: 0.5px; pointer-events: none; }
  a.home { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--color-text-dim); text-decoration: none; background: var(--pannello-sfondo); border: 1px solid var(--color-border); border-radius: 6px; padding: 4px 10px; }
  a.home:hover { color: var(--color-text); }

  /* Word detail interno */
  .wd-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
  .wd-word { font-size: 15px; font-weight: 700; }
  .wd-meta { font-size: 12px; color: var(--color-text-dim); }
  .wd-frac { font-size: 12px; color: var(--color-text-dim); margin-bottom: 6px; }
  .wd-section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--h3-color); margin: 8px 0 3px; }
  .wd-radar-wrap { display: flex; justify-content: center; }
  .wd-rel { display: flex; flex-wrap: wrap; align-items: baseline; gap: 2px 6px; font-size: 13px; margin-bottom: 2px; }
  .wd-rel > span:first-child { flex-shrink: 0; white-space: nowrap; }
  .wd-rel .nav { color: var(--color-text); cursor: pointer; word-break: break-word; }
  .wd-rel .nav:hover { text-decoration: underline; }
  .bar { flex: 1; height: 3px; background: var(--color-border); border-radius: 2px; overflow: hidden; }
  .bar > span { display: block; height: 100%; }
  .tag { border-radius: 3px; padding: 1px 6px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>
  <div id="universe-3d"></div>
  <a class="home" href="/admin">← admin</a>

  <div id="universe-info" class="overlay"><div class="hint">clicca una parola</div></div>

  <div id="universe-stats" class="overlay">
    <div class="lbl">UNIVERSO</div>
    <div class="big" id="u-word-count">—</div>
    <div class="sub">parole · 64 frattali</div>
    <div class="sub" style="margin-top:6px;">Locus</div>
    <div class="locus" id="u-locus">—</div>
  </div>

  <div class="searchbar">
    <input id="universe-search-input" placeholder="cerca parola…" onkeydown="if(event.key==='Enter') universeSearch()">
    <button onclick="universeSearch()">↵</button>
  </div>
  <div class="hint-controls" style="max-width:340px;">
    <div>Ogni stella è uno dei 64 attrattori; ogni puntino una parola, posta vicino agli attrattori a cui è affine.</div>
    <div style="margin-top:4px;opacity:0.8;">orbita: trascina · zoom: scroll · clicca o cerca una parola</div>
  </div>

  <script src="/viste/vendor/three.min.js"></script>
  <script src="/viste/vendor/OrbitControls.js"></script>
  <script type="module">
  import { UI, CD_COLORS, TRIG_COLORS, applyThemeToCss } from '/campovasto/js/theme.js';
  applyThemeToCss();
  document.documentElement.style.setProperty('--c-accent', UI.radarStroke);
  document.documentElement.style.setProperty('--c-locus', CD_COLORS[3]);

  // ── stato ──────────────────────────────────────────────────────────────
  let uFractals = [], uWords = [], uSel = null, uNbrs = [];
  let u3Scene, u3Camera, u3Renderer, u3Controls, u3Raycaster, u3Mouse;
  let u3FractalMeshes = [], u3WordCloud = null, u3ConnectionLines = null, u3NbrMeshes = [];
  let u3Container = null, u3Springs = [];
  let u3LabelSprites = [];

  const R_PURE = 300, R_INNER = 40, R_OUTER = 240;

  // ── geometria (posizioni calcolate client-side dai trigrammi + hash) ─────
  function uFractalPos3D(id) {
    const lower = (id / 8) | 0, upper = id & 7;
    const phi1 = (lower / 8) * Math.PI * 2, phi2 = (upper / 8) * Math.PI * 2;
    if (lower === upper)
      return new THREE.Vector3(Math.cos(phi1) * R_PURE, Math.sin(phi1 * 0.3) * R_PURE * 0.3, Math.sin(phi1) * R_PURE);
    let dAng = phi2 - phi1;
    if (dAng > Math.PI) dAng -= 2 * Math.PI;
    if (dAng < -Math.PI) dAng += 2 * Math.PI;
    const midAng = phi1 + dAng * 0.5, t = Math.abs(dAng) / Math.PI;
    const r = R_OUTER * (1 - t) + R_INNER * t;
    const rFinal = dAng >= 0 ? r + 12 : r - 12;
    const y = Math.sin(midAng * 1.3) * r * 0.25 + Math.cos(phi1 * 2.1) * 30;
    return new THREE.Vector3(Math.cos(midAng) * rFinal, y, Math.sin(midAng) * rFinal);
  }
  function uHash(w) {
    let h = 2166136261;
    for (let i = 0; i < w.length; i++) h = (Math.imul(h ^ w.charCodeAt(i), 16777619)) >>> 0;
    return h;
  }
  function uWordPos3D(w, fid, a1) {
    const h = uHash(w);
    const theta = (h & 0xFFFF) / 0x10000 * Math.PI * 2;
    const phi = ((h >> 16) & 0x7FFF) / 0x7FFF * Math.PI - Math.PI / 2;
    const affinity = (a1 || 0) / 100;
    const r = 12 + (80 - 12) * (1 - affinity);
    const fPos = uFractalPos3D(fid);
    return new THREE.Vector3(
      fPos.x + Math.cos(theta) * Math.cos(phi) * r,
      fPos.y + Math.sin(phi) * r,
      fPos.z + Math.sin(theta) * Math.cos(phi) * r);
  }
  function uRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }
  const trig = i => TRIG_COLORS[((i || 0) / 8) | 0];   // colore dal trigramma lower di un fractal id

  // ── carica /api/universe + /api/state ────────────────────────────────────
  async function loadUniverse() {
    try {
      const [uR, sR] = await Promise.all([fetch('/api/universe'), fetch('/api/state')]);
      const ud = await uR.json(), sd = await sR.json();
      uFractals = (ud.fractals || []).map(f => Object.assign({}, f, { pos3d: uFractalPos3D(f.id) }));
      uWords = (ud.words || []).map(wd => Object.assign({}, wd, { pos3d: uWordPos3D(wd.w, wd.f, wd.a1) }));
      document.getElementById('u-word-count').textContent = uWords.length.toLocaleString('it-IT');
      document.getElementById('u-locus').textContent = sd.locus ? sd.locus.fractal_name : '—';
      build3DScene();
    } catch (e) { console.warn('universe load error', e); }
  }

  function makeTextSprite(text, color, size) {
    const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
    const fontSize = size || 48;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    const w = ctx.measureText(text).width + 8;
    canvas.width = w; canvas.height = fontSize * 1.3;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, w / 2, canvas.height / 2);
    const tex = new THREE.CanvasTexture(canvas); tex.minFilter = THREE.LinearFilter;
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
    sprite.scale.set(w / 8, canvas.height / 8, 1);
    return sprite;
  }

  function build3DScene() {
    if (!u3Scene) return;
    u3FractalMeshes.forEach(m => u3Scene.remove(m));
    u3LabelSprites.forEach(s => u3Scene.remove(s));
    if (u3WordCloud) u3Scene.remove(u3WordCloud);
    if (u3ConnectionLines) { u3Scene.remove(u3ConnectionLines); u3ConnectionLines = null; }
    u3NbrMeshes.forEach(m => u3Scene.remove(m));
    u3FractalMeshes = []; u3LabelSprites = []; u3NbrMeshes = []; u3Springs = [];

    for (const f of uFractals) {
      const col = TRIG_COLORS[f.lower], isPure = f.lower === f.upper;
      const r = isPure ? 8 + f.activation * 8 : 3 + f.activation * 3;
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(r, isPure ? 24 : 12, isPure ? 24 : 12),
        new THREE.MeshBasicMaterial({ color: new THREE.Color(col), transparent: true, opacity: isPure ? 0.7 : 0.4 }));
      mesh.position.copy(f.pos3d);
      mesh.userData = { type: 'fractal', data: f };
      u3Scene.add(mesh); u3FractalMeshes.push(mesh);

      if (isPure) {
        const gc = document.createElement('canvas'); gc.width = gc.height = 128;
        const g = gc.getContext('2d'), grad = g.createRadialGradient(64,64,0,64,64,64);
        grad.addColorStop(0, col + 'aa'); grad.addColorStop(0.3, col + '44'); grad.addColorStop(1, col + '00');
        g.fillStyle = grad; g.fillRect(0,0,128,128);
        const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(gc), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
        glow.scale.set(r*8, r*8, 1); glow.position.copy(f.pos3d);
        u3Scene.add(glow); u3LabelSprites.push(glow);
      }
      const label = makeTextSprite(f.name, isPure ? UI.textBright : col, isPure ? 40 : 28);
      label.position.copy(f.pos3d); label.position.y -= r + 4;
      u3Scene.add(label); u3LabelSprites.push(label);
    }

    const positions = new Float32Array(uWords.length * 3), colors = new Float32Array(uWords.length * 3);
    for (let i = 0; i < uWords.length; i++) {
      const wd = uWords[i];
      positions[i*3] = wd.pos3d.x; positions[i*3+1] = wd.pos3d.y; positions[i*3+2] = wd.pos3d.z;
      const col = new THREE.Color(trig(wd.f));
      colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    u3WordCloud = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 2.5, vertexColors: true, transparent: true, opacity: 0.85, sizeAttenuation: true, depthWrite: false }));
    u3Scene.add(u3WordCloud);
  }

  function u3ShowConnections() {
    if (u3ConnectionLines) { u3Scene.remove(u3ConnectionLines); u3ConnectionLines = null; }
    u3NbrMeshes.forEach(m => u3Scene.remove(m)); u3NbrMeshes = [];
    if (!uSel || !uNbrs.length || !u3Scene) return;
    const selPos = uSel.pos3d, linePositions = [], lineColors = [];
    for (const nb of uNbrs) {
      const nbPos = nb.pos3d || uWordPos3D(nb.w, nb.f, Math.round((nb.weight || 0.5) * 100));
      linePositions.push(selPos.x, selPos.y, selPos.z, nbPos.x, nbPos.y, nbPos.z);
      const col = new THREE.Color(trig(nb.f));
      lineColors.push(col.r, col.g, col.b, col.r, col.g, col.b);
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(2, 8, 8), new THREE.MeshBasicMaterial({ color: col }));
      mesh.position.copy(nbPos); u3Scene.add(mesh); u3NbrMeshes.push(mesh);
    }
    const lGeo = new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
    lGeo.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
    u3ConnectionLines = new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.5, depthWrite: false }));
    u3Scene.add(u3ConnectionLines);
  }

  function fractalIdOf(word) { const f = uWords.find(w => w.w === word); return f ? f.f : 0; }

  async function fetchWordNeighbors(entry) {
    try {
      const enc = encodeURIComponent(entry.w);
      const [r, rc] = await Promise.all([fetch('/api/word_detail?word=' + enc), fetch('/api/concept?word=' + enc)]);
      const d = await r.json(), concept = rc.ok ? await rc.json() : null;
      const allNbrs = [
        ...(d.kg_out || []).map(e => ({ w: e.target, f: fractalIdOf(e.target), weight: e.confidence, rel: e.relation })),
        ...(d.kg_in  || []).map(e => ({ w: e.target, f: fractalIdOf(e.target), weight: e.confidence, rel: e.relation })),
        ...(d.statistical || []).map(e => ({ w: e.word, f: e.fractal_id, weight: e.weight, rel: null })),
      ];
      uNbrs = allNbrs.map(nb => ({ ...nb, pos3d: uWordPos3D(nb.w, nb.f, Math.round((nb.weight || 0.5) * 100)) }));
      u3ShowConnections();
      renderWordDetail(d, concept);
    } catch (e) { console.warn('word detail error', e); }
  }

  // ── pannello dettaglio parola (viewer, niente edit) ──────────────────────
  const REL_COL = { IS_A: TRIG_COLORS[5], HAS: TRIG_COLORS[1], DOES: TRIG_COLORS[2], CAUSES: TRIG_COLORS[6], SIMILAR_TO: TRIG_COLORS[3], OPPOSITE_OF: TRIG_COLORS[0], PART_OF: TRIG_COLORS[4], USED_FOR: TRIG_COLORS[7] };
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function renderConceptBlock(c) {
    if (!c) return '';
    const rows = [
      c.type_chain?.length ? ['è un tipo di', REL_COL.IS_A, c.type_chain] : null,
      c.instances?.length  ? ['comprende', REL_COL.IS_A, c.instances] : null,
      c.has?.length        ? ['ha', REL_COL.HAS, c.has] : null,
      c.does?.length       ? ['fa', REL_COL.DOES, c.does] : null,
      c.causes?.length     ? ['causa', REL_COL.CAUSES, c.causes] : null,
      c.similar?.length    ? ['simile a', REL_COL.SIMILAR_TO, c.similar] : null,
      c.opposites?.length  ? ['opposto di', REL_COL.OPPOSITE_OF, c.opposites] : null,
    ].filter(Boolean);
    if (!rows.length && !c.definition) return '';
    const tag = (words, color) => words.slice(0,8).map(w =>
      `<span class="tag" style="border:1px solid ${color}55;color:${color};" onclick="searchUWord('${esc(w)}')">${esc(w)}</span>`).join(' ');
    const defHtml = c.definition ? `<div style="font-size:12px;color:var(--color-text-dim);margin-bottom:4px;font-style:italic;">"${esc(c.definition)}"</div>` : '';
    const rowsHtml = rows.map(([label, color, words]) =>
      `<div style="display:flex;gap:6px;margin-bottom:3px;"><span style="font-size:12px;color:var(--color-text-dim);min-width:54px;">${label}</span><div style="display:flex;flex-wrap:wrap;gap:3px;">${tag(words, color)}</div></div>`).join('');
    const density = c.ontology_density > 0 ? `<div style="font-size:12px;color:var(--testo-tenue);margin-top:4px;">${c.ontology_density} parole condividono questo ontotipo</div>` : '';
    return `<div class="wd-section">concetto</div>${defHtml}${rowsHtml}${density}`;
  }

  function renderWordDetail(d, concept) {
    const el = document.getElementById('universe-info'); if (!el) return;
    const col = trig(d.fractal_id);
    const DIM_LABELS = ['Confine','Valenza','Intensità','Definiz.','Compless.','Permanen.','Agency','Tempo'];
    const OCT_LABELS = ['Scopo','Progresso','Creatività','Possesso','Connessione','Urgenza','Mistero','Perdita'];
    const firma = d.firma_8d || [.5,.5,.5,.5,.5,.5,.5,.5];
    const oct = d.octalysis || {};
    const octVals = [oct.significato_epico||0, oct.realizzazione||0, oct.creativita||0, oct.possesso||0, oct.influenza_sociale||0, oct.scarsita||0, oct.curiosita||0, oct.evitamento_perdita||0];
    let maxDrive = 0; octVals.forEach((v,i) => { if (v > octVals[maxDrive]) maxDrive = i; });

    const relRow = (e, dir) => `<div class="wd-rel"><span style="color:${REL_COL[e.relation] || UI.textMuted};min-width:58px;">${esc(e.nome || e.relation)}${dir==='in'?' ←':''}</span><span class="nav" onclick="searchUWord('${esc(e.target)}')">${esc(e.target)}</span></div>`;
    const kgHtml = [...(d.kg_out||[]).map(e => relRow(e,'out')), ...(d.kg_in||[]).map(e => relRow(e,'in'))].join('');
    const statHtml = (d.statistical||[]).length ? `<div class="wd-section">co-occorrenze</div>` + d.statistical.map(e =>
      `<div class="wd-rel"><span style="color:var(--testo-tenue);min-width:18px;text-align:center;">~</span><span class="nav" style="color:${trig(e.fractal_id)};" onclick="searchUWord('${esc(e.word)}')">${esc(e.word)}</span><span style="color:var(--color-text-dim);margin-left:auto;">${Math.round(e.weight*100)}%</span></div>`).join('') : '';
    const affHtml = (d.top_affinities||[]).slice(0,4).map(a => {
      const ac = trig(a.fractal_id), pct = Math.round(a.value*100);
      return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;"><span style="font-size:12px;color:${ac};min-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(a.fractal_name)}</span><div class="bar"><span style="width:${pct}%;background:${ac};"></span></div><span style="font-size:12px;color:var(--color-text-dim);">${pct}%</span></div>`;
    }).join('');
    const octBars = octVals.map((v,i) => {
      const c = CD_COLORS[i], pct = Math.round(v*100);
      return `<div style="display:flex;align-items:center;gap:4px;margin-bottom:1px;"><span style="font-size:12px;color:${c};min-width:46px;">${OCT_LABELS[i]}</span><div class="bar"><span style="width:${pct}%;background:${c};"></span></div><span style="font-size:12px;color:var(--color-text-dim);min-width:18px;text-align:right;">${pct}</span></div>`;
    }).join('');

    el.innerHTML = `
      <div class="wd-head"><span class="wd-word" style="color:${col};">${esc(d.word)}</span><span class="wd-meta">stab. ${Math.round((d.stability||0)*100)}% · esp. ${d.exposure ?? 0}</span></div>
      <div class="wd-frac">frattale: <span style="color:${col}">${esc(d.fractal_name || '?')}</span></div>
      <div class="wd-section">firma 8D</div>
      <div class="wd-radar-wrap"><canvas id="wd-radar-8d" width="150" height="150"></canvas></div>
      <div class="wd-section">drive dominante — <span style="color:${CD_COLORS[maxDrive]}">${OCT_LABELS[maxDrive]}</span></div>
      ${octBars}
      ${affHtml ? '<div class="wd-section">affinità</div>' + affHtml : ''}
      ${kgHtml ? '<div class="wd-section">semantica</div>' + kgHtml : ''}
      ${statHtml}
      ${renderConceptBlock(concept)}`;
    requestAnimationFrame(() => uDrawMiniRadar('wd-radar-8d', firma, DIM_LABELS, uRgba(TRIG_COLORS[1], 0.25), uRgba(TRIG_COLORS[1], 0.85)));
  }

  function uDrawMiniRadar(canvasId, values, labels, fillC, strokeC) {
    const c = document.getElementById(canvasId); if (!c) return;
    const ctx = c.getContext('2d'), w = c.width, h = c.height, cx = w/2, cy = h/2, R = Math.min(cx,cy) - 20, n = values.length;
    ctx.clearRect(0,0,w,h);
    [0.25,0.5,0.75,1].forEach(lev => {
      ctx.beginPath();
      for (let i = 0; i <= n; i++) { const a = (i%n)/n*Math.PI*2 - Math.PI/2, x = cx+Math.cos(a)*R*lev, y = cy+Math.sin(a)*R*lev; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
      ctx.closePath(); ctx.strokeStyle = UI.radarRingInner; ctx.lineWidth = 0.5; ctx.stroke();
    });
    ctx.font = '7px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let i = 0; i < n; i++) {
      const a = i/n*Math.PI*2 - Math.PI/2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R); ctx.strokeStyle = UI.radarSpokes; ctx.stroke();
      ctx.fillStyle = UI.radarRingOuter; ctx.fillText(labels[i], cx+Math.cos(a)*(R+13), cy+Math.sin(a)*(R+13));
    }
    ctx.beginPath();
    for (let i = 0; i <= n; i++) { const a = (i%n)/n*Math.PI*2 - Math.PI/2, v = Math.max(0,Math.min(1,values[i%n])), x = cx+Math.cos(a)*R*v, y = cy+Math.sin(a)*R*v; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
    ctx.closePath(); ctx.fillStyle = fillC; ctx.fill(); ctx.strokeStyle = strokeC; ctx.lineWidth = 1.2; ctx.stroke();
    for (let i = 0; i < n; i++) { const a = i/n*Math.PI*2 - Math.PI/2, v = Math.max(0,Math.min(1,values[i])); ctx.beginPath(); ctx.arc(cx+Math.cos(a)*R*v, cy+Math.sin(a)*R*v, 2, 0, Math.PI*2); ctx.fillStyle = strokeC; ctx.fill(); }
  }

  // ── ricerca ──────────────────────────────────────────────────────────────
  function searchUWord(word) { document.getElementById('universe-search-input').value = word; universeSearch(); }
  function universeSearch() {
    const q = (document.getElementById('universe-search-input').value || '').trim().toLowerCase();
    if (!q || !u3Camera || !u3Controls) return;
    const found = uWords.find(w => w.w === q) || uWords.find(w => w.w.startsWith(q));
    if (found) {
      uSel = found; uNbrs = [];
      const target = found.pos3d.clone();
      u3Controls.target.copy(target);
      u3Camera.position.copy(target).add(new THREE.Vector3(30, 20, 30));
      u3Controls.update();
      fetchWordNeighbors(found);
    }
  }
  window.searchUWord = searchUWord;          // esposti per gli onclick inline
  window.universeSearch = universeSearch;

  // ── scena ──────────────────────────────────────────────────────────────
  function init3DUniverse() {
    u3Container = document.getElementById('universe-3d'); if (!u3Container) return;
    const W = u3Container.clientWidth || 800, H = u3Container.clientHeight || 600;
    u3Scene = new THREE.Scene();
    u3Scene.background = new THREE.Color(UI.bg);
    u3Scene.fog = new THREE.FogExp2(UI.bg, 0.0015);
    u3Camera = new THREE.PerspectiveCamera(60, W/H, 1, 3000);
    u3Camera.position.set(0, 200, 500);
    u3Renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    u3Renderer.setSize(W, H); u3Renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    u3Container.appendChild(u3Renderer.domElement);
    u3Controls = new THREE.OrbitControls(u3Camera, u3Renderer.domElement);
    u3Controls.enableDamping = true; u3Controls.dampingFactor = 0.08;
    u3Controls.minDistance = 20; u3Controls.maxDistance = 1200; u3Controls.target.set(0,0,0);
    u3Scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    u3Raycaster = new THREE.Raycaster(); u3Raycaster.params.Points.threshold = 4; u3Mouse = new THREE.Vector2();

    u3Renderer.domElement.addEventListener('click', e => {
      const rect = u3Renderer.domElement.getBoundingClientRect();
      u3Mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1;
      u3Mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
      u3Raycaster.setFromCamera(u3Mouse, u3Camera);
      const fHits = u3Raycaster.intersectObjects(u3FractalMeshes);
      if (fHits.length) { u3Controls.target.copy(fHits[0].object.position); u3Controls.update(); return; }
      if (u3WordCloud) {
        const pHits = u3Raycaster.intersectObject(u3WordCloud);
        if (pHits.length) { const idx = pHits[0].index; if (idx !== undefined && idx < uWords.length) { uSel = uWords[idx]; uNbrs = []; fetchWordNeighbors(uSel); return; } }
      }
      uSel = null; uNbrs = []; u3ShowConnections();
      document.getElementById('universe-info').innerHTML = '<div class="hint">clicca una parola</div>';
    });

    // drag delle stelle-frattale (torna a posto con molla; non persiste)
    let dragActive = false, dragMesh = null, dragOrig = new THREE.Vector3();
    const dragPlane = new THREE.Plane(), dragHit = new THREE.Vector3(), dragOff = new THREE.Vector3();
    u3Renderer.domElement.addEventListener('pointerdown', e => {
      const rect = u3Renderer.domElement.getBoundingClientRect();
      u3Mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1; u3Mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
      u3Raycaster.setFromCamera(u3Mouse, u3Camera);
      const hits = u3Raycaster.intersectObjects(u3FractalMeshes);
      if (hits.length) {
        dragActive = true; dragMesh = hits[0].object; dragOrig.copy(dragMesh.position); u3Controls.enabled = false;
        dragPlane.setFromNormalAndCoplanarPoint(u3Camera.getWorldDirection(new THREE.Vector3()).negate(), dragMesh.position);
        u3Raycaster.ray.intersectPlane(dragPlane, dragHit); dragOff.subVectors(dragMesh.position, dragHit);
        u3Springs = u3Springs.filter(s => s.mesh !== dragMesh);
      }
    });
    u3Renderer.domElement.addEventListener('pointermove', e => {
      if (!dragActive || !dragMesh) return;
      const rect = u3Renderer.domElement.getBoundingClientRect();
      u3Mouse.x = ((e.clientX-rect.left)/rect.width)*2 - 1; u3Mouse.y = -((e.clientY-rect.top)/rect.height)*2 + 1;
      u3Raycaster.setFromCamera(u3Mouse, u3Camera);
      if (u3Raycaster.ray.intersectPlane(dragPlane, dragHit)) dragMesh.position.copy(dragHit.add(dragOff));
    });
    const endDrag = () => { if (dragActive && dragMesh) { u3Springs.push({ mesh: dragMesh, origPos: dragOrig.clone() }); dragActive = false; dragMesh = null; } u3Controls.enabled = true; };
    u3Renderer.domElement.addEventListener('pointerup', endDrag);
    u3Renderer.domElement.addEventListener('pointerleave', endDrag);

    new ResizeObserver(() => {
      const w = u3Container.clientWidth, h = u3Container.clientHeight; if (w < 10 || h < 10) return;
      u3Camera.aspect = w/h; u3Camera.updateProjectionMatrix(); u3Renderer.setSize(w, h);
    }).observe(u3Container);

    (function animate() {
      requestAnimationFrame(animate);
      for (let i = u3Springs.length-1; i >= 0; i--) {
        const s = u3Springs[i]; s.mesh.position.lerp(s.origPos, 0.04);
        if (s.mesh.position.distanceTo(s.origPos) < 0.3) { s.mesh.position.copy(s.origPos); u3Springs.splice(i,1); }
      }
      u3Controls.update(); u3Renderer.render(u3Scene, u3Camera);
    })();
  }

  init3DUniverse();
  loadUniverse();
  </script>
</body>
</html>
