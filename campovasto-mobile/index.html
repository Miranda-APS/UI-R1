<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1020">
  <base href="/campovasto-mobile/">
  <title>Campovasto Mobile</title>
  <link rel="stylesheet" href="style.css?v=1">
  <script src="/campovasto/vendor/vis-network.min.js"></script>
  <script src="app.js?v=1" type="module"></script>
</head>
<body>
  <div class="app-shell">
    <main class="main">
      <section id="view-vasto" class="view is-active" aria-label="campo vasto">
        <div class="field-shell">
          <div class="graph-card graph-card-full">
            <div id="graph"></div>
            <div id="graphOverlay" class="graph-overlay">caricamento campo vasto…</div>
          </div>

          <div class="hud hud-top">
            <div class="brand-badge">
              <div class="eyebrow">UI-R1</div>
              <div class="brand-title">campo vasto</div>
            </div>
            <div class="hud-actions">
              <button id="searchToggle" class="ghost-button circle-button" type="button" aria-label="cerca">⌕</button>
              <button id="resetVasto" class="ghost-button circle-button" type="button" aria-label="panorama">◎</button>
            </div>
          </div>

          <div id="searchPanel" class="floating-panel search-panel is-hidden">
            <label class="search-box" for="searchInput">
              <input id="searchInput" type="search" autocomplete="off" spellcheck="false" placeholder="cerca una parola">
            </label>
            <div id="searchResults" class="search-results" aria-live="polite"></div>
          </div>

          <button id="primaryCta" class="fab" type="button">scrivi una frase</button>
        </div>
      </section>

      <section id="view-personale" class="view" aria-label="tuo campo">
        <div class="field-shell">
          <div id="sceneCard" class="scene-card scene-card-full">
            <div id="medioScene" class="medio-scene">
              <div class="scene-empty">
                Tocca <strong>scrivi una frase</strong> per generare il tuo campo.
              </div>
            </div>
          </div>

          <div id="personalGraphCard" class="graph-card graph-card-full is-hidden">
            <div id="personalGraph"></div>
            <div id="personalGraphOverlay" class="graph-overlay">Il tuo campo e' vuoto. Scrivi una frase o aggiungi parole dal vasto.</div>
          </div>

          <div class="hud hud-top">
            <div class="brand-badge">
              <div class="eyebrow">UI-R1</div>
              <div class="brand-title">tuo campo</div>
            </div>
            <div class="hud-actions">
              <button id="composeToggle" class="ghost-button" type="button">frase</button>
              <button id="goPersonal" class="ghost-button circle-button" type="button" aria-label="grafo personale">◉</button>
              <button id="clearPersonal" class="ghost-button circle-button" type="button" aria-label="svuota">×</button>
            </div>
          </div>

          <div class="hud hud-bottom">
            <div class="toggle-row compact-toggle" id="personalModeToggle">
              <button class="toggle-chip is-active" type="button" data-mode="scene">scena</button>
              <button class="toggle-chip" type="button" data-mode="graph">grafo</button>
            </div>
          </div>

          <div id="composePanel" class="floating-panel compose-panel is-hidden">
            <label class="composer" for="sentenceInput">
              <textarea id="sentenceInput" rows="3" placeholder="scrivi una frase"></textarea>
            </label>
            <div class="row-actions">
              <button id="buildScene" class="primary-button" type="button">interpreta</button>
              <button id="focusLatest" class="ghost-button" type="button">ultima</button>
            </div>
            <div id="sentenceMeta" class="sentence-meta">Nessuna frase attiva.</div>
            <div id="personalStats" class="stats-row"></div>
            <div id="phraseHistory" class="search-results" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="navigazione principale">
      <button class="nav-button is-active" data-view="vasto" type="button">campo</button>
      <button class="nav-button nav-button-primary" data-view="scrivi" type="button">frase</button>
      <button class="nav-button" data-view="personale" type="button">tuo</button>
    </nav>
  </div>

  <aside id="sheet" class="sheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-kicker" id="sheetKicker">anteprima</div>
      <h3 id="sheetTitle">Seleziona un nodo</h3>
      <div id="sheetSubtitle" class="sheet-subtitle">Tocca una parola nel campo o nella scena.</div>
      <div id="sheetContent" class="sheet-content"></div>
      <div id="sheetActions" class="sheet-actions"></div>
    </div>
  </aside>
</body>
</html>
