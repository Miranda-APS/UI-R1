<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020210">
<title>Prometeo — Dialogo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#020210;font-family:'Courier New',monospace;color:#c8d4ff}
body{display:flex;flex-direction:column}

/* ── HUD ── */
#hud{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top,0px)) 16px 10px;
  background:rgba(2,2,22,.95);border-bottom:1px solid rgba(60,80,200,.1);
}
#logo{font:.65rem/1 'Courier New',monospace;letter-spacing:.3em;color:rgba(130,150,255,.5)}
#hud a{margin-left:auto;font:.65rem/1 'Courier New',monospace;color:rgba(100,120,200,.45);text-decoration:none}

/* ── Stage: fills all space between HUD and input bar ── */
#stage{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  position:relative;
}

/* ── Response view (default view) ── */
#response-view{
  flex:1;display:flex;flex-direction:column;
  padding:28px 20px 16px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  transition:opacity .25s;
}

#response-label{
  font:.72rem/1 'Courier New',monospace;letter-spacing:.18em;
  color:rgba(140,165,255,.55);text-transform:uppercase;margin-bottom:16px;
}

#response-text{
  font:clamp(1.15rem,5vw,1.6rem)/1.6 'Courier New',monospace;
  color:#e0eaff;flex:1;transition:opacity .3s;
}
#response-text.empty{
  color:rgba(140,160,220,.45);
  font:clamp(1rem,4vw,1.2rem)/1.7 'Courier New',monospace;
}

/* activated words */
#words-strip{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-top:22px;padding-top:16px;
  border-top:1px solid rgba(60,80,160,.12);
}
.act-word{
  font:.72rem/1 'Courier New',monospace;
  padding:7px 13px;border-radius:20px;
  background:rgba(30,40,100,.5);
  border:1px solid rgba(70,100,200,.25);
  color:rgba(170,190,255,.8);
  cursor:pointer;transition:background .15s,border-color .15s,color .15s;
  -webkit-tap-highlight-color:transparent;
}
.act-word:active,.act-word.selected{
  background:rgba(60,90,200,.55);
  border-color:rgba(100,140,255,.5);
  color:#e8f0ff;
}

/* ── Word detail panel (slides up over response) ── */
#detail{
  position:absolute;left:0;right:0;bottom:0;
  background:rgba(4,5,24,.97);
  border-top:1px solid rgba(60,80,200,.2);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  max-height:72%;
  backdrop-filter:blur(8px);
}
#detail.open{transform:translateY(0)}

#det-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;border-bottom:1px solid rgba(50,70,160,.15);
  flex-shrink:0;
}
#det-word{font:1.15rem/1 'Courier New',monospace;color:#e0eaff;letter-spacing:.04em}
#det-meta{font:.58rem/1.4 'Courier New',monospace;color:rgba(110,130,200,.5);margin-left:2px}
#det-close{
  margin-left:auto;background:none;border:none;
  color:rgba(100,120,200,.45);font:1.1rem/1 'Courier New',monospace;
  cursor:pointer;padding:2px 4px;
}

#det-body{overflow-y:auto;padding:14px 16px 20px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:16px}

/* relations */
.sec-title{
  font:.55rem/1 'Courier New',monospace;letter-spacing:.2em;
  color:rgba(100,120,200,.38);text-transform:uppercase;margin-bottom:8px;
}
.rel-list{display:flex;flex-direction:column;gap:6px}
.rel-row{display:flex;align-items:center;gap:8px}
.rel-badge{
  font:.56rem/1 'Courier New',monospace;padding:3px 8px;
  border-radius:8px;white-space:nowrap;flex-shrink:0;
}
.rel-target{
  font:.75rem/1.3 'Courier New',monospace;color:#c0d4ff;
  cursor:pointer;border-bottom:1px solid rgba(70,110,200,.2);
  padding-bottom:1px;
}
.rel-target:active{color:#fff}

/* Octalysis */
.oct-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.oct-item{background:rgba(8,10,36,.6);border:1px solid rgba(40,60,140,.2);border-radius:8px;padding:9px 11px}
.oct-label{font:.56rem/1 'Courier New',monospace;color:rgba(130,150,210,.5);margin-bottom:5px}
.oct-bar-bg{height:5px;background:rgba(30,40,100,.4);border-radius:3px;overflow:hidden}
.oct-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.oct-val{font:.62rem/1 'Courier New',monospace;color:rgba(150,170,240,.65);margin-top:3px}

/* typing dots */
#typing{display:none;align-items:center;gap:5px;padding:6px 0}
#typing span{width:7px;height:7px;border-radius:50%;background:rgba(100,130,255,.45);animation:bk 1.2s infinite}
#typing span:nth-child(2){animation-delay:.2s}
#typing span:nth-child(3){animation-delay:.4s}
@keyframes bk{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ── Input bar ── */
#bar{
  flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));
  background:rgba(2,2,22,.97);border-top:1px solid rgba(60,80,200,.1);
}
#inp{
  flex:1;background:rgba(255,255,255,.05);
  border:1px solid rgba(80,100,220,.18);border-radius:24px;
  color:#d8e2ff;padding:12px 18px;
  font:.82rem/1 'Courier New',monospace;outline:none;
  -webkit-appearance:none;
}
#inp::placeholder{color:rgba(90,110,170,.32)}
#inp:focus{border-color:rgba(90,130,255,.38)}
#send{
  background:rgba(50,70,190,.5);border:1px solid rgba(80,110,240,.3);
  border-radius:24px;color:#b8c8ff;
  font:.82rem/1 'Courier New',monospace;
  padding:12px 18px;cursor:pointer;flex-shrink:0;
}
#send:active{background:rgba(70,100,230,.65)}

/* ── Teach form ── */
#teach-form{
  background:rgba(8,10,36,.7);border:1px solid rgba(60,90,200,.2);
  border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;
}
.teach-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.teach-from{
  font:.75rem/1 'Courier New',monospace;color:#a0b8ff;
  background:rgba(40,60,160,.3);border:1px solid rgba(70,100,200,.25);
  border-radius:8px;padding:6px 10px;flex-shrink:0;
}
#teach-rel{
  flex:1;min-width:100px;
  background:rgba(255,255,255,.05);border:1px solid rgba(70,100,200,.2);
  border-radius:8px;color:#c8d8ff;padding:6px 10px;
  font:.75rem/1 'Courier New',monospace;outline:none;
  -webkit-appearance:none;cursor:pointer;
}
#teach-to{
  flex:2;min-width:120px;
  background:rgba(255,255,255,.05);border:1px solid rgba(70,100,200,.2);
  border-radius:8px;color:#c8d8ff;padding:6px 10px;
  font:.75rem/1 'Courier New',monospace;outline:none;
}
#teach-to::placeholder{color:rgba(90,110,170,.35)}
#teach-btn{
  background:rgba(50,80,200,.45);border:1px solid rgba(80,120,240,.3);
  border-radius:8px;color:#b0c4ff;font:.72rem/1 'Courier New',monospace;
  padding:7px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
#teach-btn:active{background:rgba(70,110,240,.6)}
#teach-ok{
  font:.62rem/1 'Courier New',monospace;color:rgba(80,220,120,.7);
  display:none;padding-top:2px;
}

/* badge colors applied inline from API e.colore */
</style>
</head>
<body>

<div id="hud">
  <span id="logo">PROMETEO</span>
  <a href="/">← home</a>
</div>

<div id="stage">
  <div id="response-view">
    <div id="response-label">Prometeo risponde</div>
    <div id="response-text" class="empty">Scrivi una parola o una frase.</div>
    <div id="typing"><span></span><span></span><span></span></div>
    <div id="words-strip"></div>
  </div>

  <div id="detail">
    <div id="det-header">
      <span id="det-word"></span>
      <span id="det-meta"></span>
      <button id="det-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="det-body">
      <div id="det-rels"></div>
      <div id="teach-form">
        <div class="sec-title">insegna una relazione</div>
        <div class="teach-row">
          <span class="teach-from" id="teach-from-label">—</span>
          <select id="teach-rel">
            <optgroup label="strutturali">
              <option value="IS_A">è un</option>
              <option value="HAS">ha</option>
              <option value="DOES">fa</option>
              <option value="PART_OF">è parte di</option>
            </optgroup>
            <optgroup label="causali">
              <option value="CAUSES">causa</option>
              <option value="ENABLES">abilita</option>
              <option value="REQUIRES">richiede</option>
              <option value="TRANSFORMS_INTO">diventa</option>
            </optgroup>
            <optgroup label="semantiche">
              <option value="SIMILAR_TO">è simile a</option>
              <option value="OPPOSITE_OF">è opposto di</option>
              <option value="USED_FOR">è usato per</option>
              <option value="EXPRESSES">esprime</option>
              <option value="SYMBOLIZES">simboleggia</option>
              <option value="CONTEXT_OF">è contesto di</option>
            </optgroup>
            <optgroup label="logiche">
              <option value="IMPLIES">implica</option>
              <option value="EQUIVALENT">equivale a</option>
              <option value="EXCLUDES">esclude</option>
              <option value="COEXISTS">coesiste con</option>
            </optgroup>
            <optgroup label="fenomenologiche">
              <option value="FEELS_AS">si sente come</option>
              <option value="WONDERS_ABOUT">si interroga su</option>
              <option value="REMEMBERS_AS">ricorda come</option>
            </optgroup>
          </select>
          <input id="teach-to" type="text" placeholder="parola…"
            autocomplete="off" autocorrect="off" spellcheck="false">
          <button id="teach-btn" onclick="teachRelation()">+</button>
        </div>
        <div id="teach-ok">✓ relazione salvata — visibile nel grafo</div>
      </div>
      <div id="det-oct"></div>
    </div>
  </div>
</div>

<div id="bar">
  <input id="inp" type="text" placeholder="scrivi a prometeo…"
    autocomplete="off" autocorrect="off" spellcheck="false"
    enterkeyhint="send">
  <button id="send" onclick="send()">→</button>
</div>

<script>
'use strict';

// No manual mappings needed — API returns e.nome (Italian) and e.colore (CSS color)
const OCT = [
  ['significato_epico','Significato epico','#6a9fff'],
  ['realizzazione',    'Realizzazione',    '#ff9050'],
  ['creativita',       'Creatività',       '#b06aff'],
  ['possesso',         'Possesso',         '#50cc70'],
  ['influenza_sociale','Influenza sociale','#50ccc0'],
  ['scarsita',         'Scarsità',         '#ddcc30'],
  ['curiosita',        'Curiosità',        '#ff70a0'],
  ['evitamento_perdita','Evit. perdita',   '#ff5050'],
];

const inp   = document.getElementById('inp');
const rtext = document.getElementById('response-text');
const strip = document.getElementById('words-strip');
const typing= document.getElementById('typing');
let selectedWord = null;

/* ── Send ── */
async function send() {
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.blur();
  closeDetail();

  // Clear previous
  rtext.textContent = '';
  rtext.classList.remove('empty');
  strip.innerHTML = '';
  typing.style.display = 'flex';

  // Extract first word from input to load its detail
  const firstWord = text.split(/\s+/)[0].replace(/[^a-zàáèéìíòóùú]/gi,'').toLowerCase();

  try {
    // Fire both in parallel: Prometeo response + word detail for what the user typed
    const [resp, detail] = await Promise.all([
      fetch('/api/input', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text })
      }).then(r => r.json()),
      firstWord.length >= 3
        ? fetch('/api/word_detail?word=' + encodeURIComponent(firstWord)).then(r => r.json())
        : Promise.resolve(null)
    ]);

    typing.style.display = 'none';
    rtext.textContent = resp.generated_text || '…';
    renderWords(resp.keywords || []);

    // Open detail for the word the user typed
    if (detail && detail.word) renderDetail(detail);

  } catch(e) {
    typing.style.display = 'none';
    rtext.textContent = '(errore di connessione)';
    rtext.classList.add('empty');
  }
}

function renderWords(words) {
  strip.innerHTML = '';
  selectedWord = null;
  words.forEach(w => {
    const btn = document.createElement('span');
    btn.className = 'act-word';
    btn.textContent = w;
    btn.onclick = () => selectWord(w, btn);
    strip.appendChild(btn);
  });
}

/* ── Word selection → detail ── */
async function selectWord(word, btn) {
  // Toggle off if same word
  if (selectedWord === word) { closeDetail(); return; }

  // Deselect previous
  strip.querySelectorAll('.act-word').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWord = word;

  try {
    const r = await fetch('/api/word_detail?word=' + encodeURIComponent(word));
    const d = await r.json();
    renderDetail(d);
  } catch(e) {}
}

function renderDetail(d) {
  currentDetailWord = d.word || null;
  document.getElementById('det-word').textContent = d.word || '—';
  document.getElementById('det-meta').textContent =
    `stabilità ${Math.round((d.stability||0)*100)}% · ${d.fractal_name||'frattale '+d.fractal_id}`;
  document.getElementById('teach-from-label').textContent = d.word || '—';
  document.getElementById('teach-ok').style.display = 'none';
  document.getElementById('teach-to').value = '';

  /* Relations — sorted by confidence, weak ones dimmed */
  const relsEl = document.getElementById('det-rels');
  relsEl.innerHTML = '';
  const outEdges = (d.kg_out || []).slice().sort((a,b) => (b.confidence||0)-(a.confidence||0));
  const inEdges  = (d.kg_in  || []).slice().sort((a,b) => (b.confidence||0)-(a.confidence||0));
  const CONF_THRESHOLD = 0.35; // below this = noise
  if (outEdges.length || inEdges.length) {
    const t = document.createElement('div'); t.className='sec-title'; t.textContent='relazioni';
    relsEl.appendChild(t);
    const list = document.createElement('div'); list.className='rel-list';
    outEdges.forEach(e => {
      list.appendChild(makeRelRow(e.colore, e.nome, e.target, e.target, false, e.confidence||0));
    });
    inEdges.forEach(e => {
      list.appendChild(makeRelRow(e.colore, e.nome, e.target, e.target, true, e.confidence||0));
    });
    // Separator before low-confidence if any exist
    const hasWeak = [...outEdges,...inEdges].some(e => (e.confidence||0) < CONF_THRESHOLD);
    if (hasWeak) {
      const sep = document.createElement('div');
      sep.style.cssText = 'font:.52rem/1 "Courier New",monospace;color:rgba(100,120,160,.3);margin-top:6px;letter-spacing:.1em';
      sep.textContent = '↑ relazioni certe  ·  ↓ possibili / generate';
      list.insertBefore(sep, [...list.children].find(c =>
        c._conf !== undefined && c._conf < CONF_THRESHOLD) || null);
    }
    relsEl.appendChild(list);
  }

  /* Octalysis */
  const octEl = document.getElementById('det-oct');
  octEl.innerHTML = '';
  if (d.octalysis) {
    const t = document.createElement('div'); t.className='sec-title'; t.textContent='profilo octalysis';
    octEl.appendChild(t);
    const grid = document.createElement('div'); grid.className='oct-grid';
    OCT.forEach(([key,label,color]) => {
      const val = Math.round((d.octalysis[key]||0)*100);
      const item = document.createElement('div'); item.className='oct-item';
      item.innerHTML = `<div class="oct-label">${label}</div>
        <div class="oct-bar-bg"><div class="oct-bar-fill" style="width:${val}%;background:${color}40;border-right:2px solid ${color}"></div></div>
        <div class="oct-val">${val}%</div>`;
      grid.appendChild(item);
    });
    octEl.appendChild(grid);
  }

  document.getElementById('detail').classList.add('open');
  document.getElementById('det-body').scrollTop = 0;
}

const CONF_THRESHOLD = 0.35;

function makeRelRow(color, label, targetWord, displayWord, incoming, conf) {
  const weak = conf < CONF_THRESHOLD;
  const row = document.createElement('div');
  row.className = 'rel-row';
  row._conf = conf;
  if (weak) row.style.opacity = '0.38';

  const badge = document.createElement('span');
  badge.className = 'rel-badge';
  badge.style.cssText = `background:${color}22;color:${color};border:1px solid ${color}55`;
  badge.textContent = label;

  const tgt = document.createElement('span');
  tgt.className = 'rel-target';
  tgt.textContent = incoming ? `← ${displayWord}` : displayWord;
  tgt.onclick = () => openDetailDirect(targetWord);

  // Confidence bar (tiny, subtle)
  const confBar = document.createElement('span');
  confBar.style.cssText = `margin-left:auto;width:28px;height:3px;border-radius:2px;flex-shrink:0;
    background:linear-gradient(to right,${color}99 ${Math.round(conf*100)}%,rgba(40,50,100,.2) 0%)`;
  confBar.title = `confidenza ${Math.round(conf*100)}%`;

  row.appendChild(badge); row.appendChild(tgt); row.appendChild(confBar);
  return row;
}

async function openDetailDirect(word) {
  try {
    const r = await fetch('/api/word_detail?word=' + encodeURIComponent(word));
    renderDetail(await r.json());
  } catch(e) {}
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  strip.querySelectorAll('.act-word').forEach(b => b.classList.remove('selected'));
  selectedWord = null;
}

/* ── Teach relation ── */
let currentDetailWord = null;

async function teachRelation() {
  const from = currentDetailWord;
  const rel  = document.getElementById('teach-rel').value;
  const to   = document.getElementById('teach-to').value.trim().toLowerCase();
  if (!from || !to) return;

  try {
    const r = await fetch('/api/word_connect', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ from, relation: rel, to })
    });
    const ok = await r.json();
    const fb = document.getElementById('teach-ok');
    fb.textContent = ok ? '✓ relazione salvata — visibile nel grafo' : '✗ parola non nel campo';
    fb.style.color = ok ? 'rgba(80,220,120,.75)' : 'rgba(255,100,80,.7)';
    fb.style.display = 'block';
    if (ok) {
      document.getElementById('teach-to').value = '';
      // Reload relations for current word
      setTimeout(() => openDetailDirect(from), 400);
    }
    setTimeout(() => { fb.style.display = 'none'; }, 3000);
  } catch(e) {}
}

document.getElementById('teach-to').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); teachRelation(); }
});

inp.addEventListener('keydown', e => { if (e.key==='Enter') send(); });
</script>
</body>
</html>
