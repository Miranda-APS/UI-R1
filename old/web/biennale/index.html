<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<title>Campo Vasto — UI-R1</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;height:100vh;overflow:hidden}
#graph{flex:1}

/* SIDEBAR */
#sidebar{width:340px;background:#1a1a2e;border-left:1px solid #2a2a4e;display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;scrollbar-width:thin}
.sb-block{padding:14px 16px;border-bottom:1px solid #2a2a4e}
.sb-title{font-size:12px;color:#666;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.brand{font:600 18px/1 'Courier New',monospace;letter-spacing:.25em;color:rgba(160,180,255,.7)}

/* search */
#search{width:100%;background:#0f0f1a;border:1px solid #3a3a5e;color:#e0e0e0;padding:9px 12px;border-radius:6px;font-size:16px;outline:none;font-family:inherit}
#search:focus{border-color:#5AAFE8}
#search-results{max-height:200px;overflow-y:auto;display:none;margin-top:6px}
.search-item{padding:6px 10px;cursor:pointer;border-radius:4px;font-size:15px;border-left:3px solid #333;padding-left:10px}
.search-item:hover{background:#2a2a4e}

/* nav */
.nav-row{display:flex;gap:6px;margin-bottom:8px}
.nav-btn{background:rgba(30,30,60,.8);border:1px solid #4a5280;border-radius:6px;color:#c0ccff;font-size:18px;cursor:pointer;padding:7px 14px;display:none;line-height:1}
.nav-btn:hover{background:#3a3a6e}

/* word info */
.word-title{font-size:28px;font-weight:600;margin-bottom:2px}
.word-sub{font-size:15px;color:#888;margin-bottom:4px}
.word-empty{font-size:15px;color:#555;font-style:italic}

/* dim bars */
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dim-name{font-size:14px;width:88px;text-align:right}
.dim-bar-wrap{flex:1;height:18px;background:#0f0f1a;border-radius:2px;cursor:ew-resize;position:relative}
.dim-bar{height:100%;border-radius:2px;min-width:2px;transition:width .4s}
.dim-val{font-size:14px;width:36px;text-align:right;color:#999;font-family:'Courier New',monospace}

/* radar */
canvas#radar{display:block;margin:0 auto;width:300px;height:300px}

/* legend */
.lr{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:14px;color:rgba(220,228,255,.85)}
.lr b{width:12px;height:12px;border-radius:50%;flex-shrink:0;display:inline-block}
.lr .line-sample{width:36px;height:0;flex-shrink:0}
.legend-section{font-size:11px;color:rgba(120,140,200,.5);letter-spacing:.14em;text-transform:uppercase;margin-top:12px;margin-bottom:4px}

/* stats */
#stats{padding:10px 16px;border-top:1px solid #2a2a4e;font-size:13px;color:#555}

/* loading */
#loading{position:fixed;top:50%;left:calc(50% - 140px);transform:translate(-50%,-50%);font:18px/1.6 'Courier New',monospace;color:rgba(160,180,255,.6);text-align:center;z-index:50}

/* hover label */
#hover-label{position:fixed;z-index:100;pointer-events:none;display:none;background:rgba(10,10,30,.92);border:1px solid rgba(80,100,220,.4);border-radius:6px;padding:6px 14px;font:600 17px/1.3 -apple-system,sans-serif;color:#fff;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,20,.6)}

/* context menu */
.ctx-menu{position:fixed;z-index:200;display:none;background:#1a1a2e;border:1.5px solid #555;box-shadow:4px 4px 0 rgba(0,0,0,.5);padding:6px 0;min-width:220px}
.ctx-menu.open{display:block}
.ctx-item{font-size:16px;padding:8px 18px;color:#e0e0e0;cursor:pointer}
.ctx-item:hover{background:#2a2a4e}
.ctx-sep{height:1px;background:#333;margin:4px 0}

/* edit panel */
.action-btn{font-family:'Courier New',monospace;font-size:13px;background:#0f0f1a;border:1px solid #3a3a5e;color:#aab;padding:5px 12px;border-radius:4px;cursor:pointer}
.action-btn:hover{background:#2a2a4e;border-color:#5a5a8e}
.action-btn.active{background:#2a2a4e;border-color:#5AAFE8;color:#5AAFE8}
.edit-panel{position:fixed;z-index:150;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:2px solid #555;padding:18px;min-width:320px;max-width:400px;max-height:80vh;overflow-y:auto;display:none;box-shadow:0 8px 40px rgba(0,0,0,.7);scrollbar-width:thin}
.edit-panel.open{display:block}
.edit-panel h3{font-size:18px;margin-bottom:14px;color:#fff}
.edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.edit-row label{width:90px;font-size:14px;text-align:right}
.edit-row input[type=range]{flex:1;accent-color:#5AAFE8}
.edit-row .edit-val{width:30px;font-size:13px;color:#aaa;font-family:'Courier New',monospace}
.edit-btn{background:#2a2a4e;border:1px solid #555;color:#e0e0e0;padding:8px 20px;font-size:15px;cursor:pointer;margin-top:10px;border-radius:4px}
.edit-btn:hover{background:#3a3a6e}
</style>
</head>
<body>
<div id="graph">
  <!-- stats overlay in basso a destra nel grafo -->
  <div id="stats" style="position:absolute;bottom:10px;right:10px;font:13px 'Courier New',monospace;color:#555;z-index:5;pointer-events:none"></div>
</div>
<div id="sidebar">
  <!-- HEADER: brand + search + home + bottoni azione -->
  <div class="sb-block" style="padding:12px 16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span class="brand">UI-R1</span>
      <div style="display:flex;gap:4px">
        <button id="btn-home" class="nav-btn" onclick="goHome()" title="Vista globale" style="display:none">⌂</button>
        <button id="btn-back" class="nav-btn" onclick="goBack()" title="Indietro" style="display:none">←</button>
      </div>
    </div>
    <input id="search" type="text" placeholder="cerca una parola…" autocomplete="off" spellcheck="false">
    <div id="search-results"></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">
      <button class="action-btn" id="btnVasto" onclick="setView('vasto')">campo vasto</button>
      <button class="action-btn" id="btnVuoto" onclick="setView('vuoto')">nuovo campo</button>
      <button class="action-btn" onclick="openAddWord()">+ parola</button>
      <button class="action-btn" onclick="openAddRel()">+ relazione</button>
      <button class="action-btn" id="btnTransmit" onclick="transmitToGlobal()" style="display:none">↗ trasmetti</button>
    </div>
  </div>
  <!-- CONTENUTO: parola info + firma + octalysis + legenda -->
  <div class="sidebar-scroll">
    <div class="sb-block" id="info-block">
      <div id="info-content"><span class="word-empty">Cerca o clicca una parola</span></div>
    </div>
    <div class="sb-block" id="dim-block" style="display:none">
      <div class="sb-title">Firma 8D</div>
      <div id="dim-bars"></div>
    </div>
    <div class="sb-block" id="radar-block" style="display:none">
      <div class="sb-title">Octalysis</div>
      <canvas id="radar" width="340" height="340"></canvas>
    </div>
    <div class="sb-block">
      <div class="sb-title">Dimensioni</div>
      <div id="dim-legend"></div>
      <div class="legend-section" style="margin-top:16px">Relazioni (tipo di tratto)</div>
      <div class="lr"><span class="line-sample" style="border-top:3px dotted #888"></span>strutturale (è un, parte di)</div>
      <div class="lr"><span class="line-sample" style="border-top:3px solid #888"></span>causale › (causa, abilita)</div>
      <div class="lr"><span class="line-sample" style="border-top:3px dashed #888"></span>semantica (simile, opposto)</div>
      <div class="lr"><span class="line-sample" style="border-top:2px dotted #888"></span>fenomenologica (ha, fa)</div>
      <div class="lr"><span class="line-sample" style="border-top:2px dashed #888"></span>logica (usato per)</div>
    </div>
  </div>
</div>
<div id="loading">caricamento campo…</div>
<div id="hover-label"></div>
<div class="ctx-menu" id="ctxMenu"></div>
<div class="edit-panel" id="editPanel"></div>

<script>
'use strict';

/* ── Dimensioni ── */
const DIM_NAMES  = ['potere','materia','ardore','divenire','spazio','intreccio','verità','armonia'];
const DIM_COLORS = ['#5AAFE8','#E89A3A','#E04848','#A86EDB','#C8C4BC','#4AC880','#E8D040','#E87AAA'];
const DIM_COLORS_RGB = DIM_COLORS.map(hex=>{const h=hex.replace('#','');return[parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)];});
const DIM_ANGLES = DIM_NAMES.map((_,i) => (Math.PI*2/8)*i - Math.PI/2);

/* ── Relazioni → 5 gruppi, stile linea ── */
const REL_GROUP = {
  IS_A:'S',PART_OF:'S',
  CAUSES:'C',ENABLES:'C',REQUIRES:'C',TRANSFORMS_INTO:'C',
  SIMILAR_TO:'M',OPPOSITE_OF:'M',
  HAS:'F',DOES:'F',
  USED_FOR:'L',EXPRESSES:'L',IMPLIES:'L',EQUIVALENT:'L',EXCLUDES:'L',
  COEXISTS:'L',SYMBOLIZES:'M',CONTEXT_OF:'M',
  FEELS_AS:'F',WONDERS_ABOUT:'F',REMEMBERS_AS:'F',
};
const GROUP_DASH = { S:[5,5], C:false, M:[3,6], F:[2,4], L:[12,6] };
const RL = {
  IS_A:'è un',HAS:'ha',DOES:'fa',PART_OF:'parte di',CAUSES:'causa',ENABLES:'abilita',
  REQUIRES:'richiede',TRANSFORMS_INTO:'diventa',SIMILAR_TO:'simile a',OPPOSITE_OF:'opposto di',
  USED_FOR:'usato per',EXPRESSES:'esprime',
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ── State ── */
let network=null, nodesDS=null, edgesDS=null;
let allWords=[], allEdges=[], wordMap={};
let dimMean=[0,0,0,0,0,0,0,0];
let dimStd=[1,1,1,1,1,1,1,1];
let originalColors={};
let originalEdges=[];
let selectedWord=null;
let hoveredWord=null;
let currentRosa=null;
let isDimmed=false;
let subHoverWord=null;
let wordEdgeIdx={}; // word → [edge indices] per lookup veloce

/* ── Dimensione dominante per z-score (globale) ── */
function relDomDim(sig) {
  if(!sig||sig.length<8) return 0;
  let best=0,bestZ=-Infinity;
  for(let i=0;i<8;i++){
    const z = dimStd[i]>0.01 ? ((sig[i]||0)-dimMean[i])/dimStd[i] : 0;
    if(z>bestZ){bestZ=z;best=i;}
  }
  return best;
}

/* ── Colore = dimensione con il valore PIÙ ALTO nella firma (semplice, intuitivo) ── */
function colorFromSig(sig) {
  if(!sig||sig.length<8) return 0;
  let best=0, bestV=-1;
  for(let i=0;i<8;i++){if((sig[i]||0)>bestV){bestV=sig[i];best=i;}}
  return best;
}
// legacy: colore dall'angolo (usato solo per posizione → compatibilità)
function colorFromAngle(angle) {
  let bestDim=0, bestDist=Infinity;
  for(let i=0;i<8;i++){
    let diff=Math.abs(angle-DIM_ANGLES[i]);
    if(diff>Math.PI) diff=2*Math.PI-diff;
    if(diff<bestDist){bestDist=diff;bestDim=i;}
  }
  return bestDim;
}
/* ── Posizione 2D dalla firma 8D (z-score + proiezione radar) ── */
function sigToXY(sig) {
  let x=0,y=0;
  for(let i=0;i<8;i++){
    const z = dimStd[i]>0.01 ? ((sig[i]||50)-dimMean[i])/dimStd[i] : 0;
    x+=z*Math.cos(DIM_ANGLES[i]);
    y+=z*Math.sin(DIM_ANGLES[i]);
  }
  return {x,y};
}

/* ── Stile arco ── */
function makeEdgeOpts(rel, conf) {
  const g=REL_GROUP[rel]||'L';
  const dash=GROUP_DASH[g];
  const w=Math.max(1, ((conf||50)/100)*4);
  return {
    color:{color:'#555',opacity:0.5,highlight:'#999'},
    width:w,
    dashes:dash||false,
    arrows: g==='C' ? {to:{enabled:true,scaleFactor:0.4+w*0.08}} : {to:{enabled:true,scaleFactor:0.25}},
  };
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init() {
  const d = await fetch('/api/biennale/field').then(r=>r.json());
  document.getElementById('loading').style.display='none';

  allWords = (d.words||[]).filter(w=>w.w.length>=2&&!/[\d_]/.test(w.w));
  allEdges = d.edges||[];

  // calcola media e deviazione standard per ogni dimensione
  const sums=[0,0,0,0,0,0,0,0], sq=[0,0,0,0,0,0,0,0];
  let count=0;
  allWords.forEach(w=>{
    if(!w.sig||w.sig.length<8)return;
    for(let i=0;i<8;i++){sums[i]+=w.sig[i];sq[i]+=w.sig[i]*w.sig[i];}
    count++;
  });
  if(count>0) for(let i=0;i<8;i++){
    dimMean[i]=sums[i]/count;
    dimStd[i]=Math.sqrt(Math.max(0.01, sq[i]/count - dimMean[i]*dimMean[i]));
  }
  // === NORMALIZZAZIONE PERCENTILE ===
  // ogni dimensione viene riscalata indipendentemente a [0,100]
  // così nessuna dimensione domina e il colore = dim più alta è intuitivo
  const N=allWords.length;
  if(N>1){
    for(let d=0;d<8;d++){
      const sorted=[...allWords].sort((a,b)=>(a.sig?.[d]||0)-(b.sig?.[d]||0));
      sorted.forEach((w,rank)=>{
        if(!w._nsig) w._nsig=new Array(8).fill(50);
        w._nsig[d]=Math.round((rank/(N-1))*100);
      });
    }
    allWords.forEach(w=>{ w._rawSig=w.sig; w.sig=w._nsig||w.sig; });
  }

  // ricalcola media/std sulle firme normalizzate (per z-score posizione)
  const ns=[0,0,0,0,0,0,0,0], nq=[0,0,0,0,0,0,0,0]; let nc=0;
  allWords.forEach(w=>{
    if(!w.sig||w.sig.length<8)return;
    for(let i=0;i<8;i++){ns[i]+=w.sig[i];nq[i]+=w.sig[i]*w.sig[i];}
    nc++;
  });
  if(nc>0) for(let i=0;i<8;i++){dimMean[i]=ns[i]/nc;dimStd[i]=Math.sqrt(Math.max(0.01,nq[i]/nc-dimMean[i]*dimMean[i]));}

  // posizioni 2D + colore
  allWords.forEach(w=>{
    const p=sigToXY(w.sig||[]);
    w._rx=p.x; w._ry=p.y;
    w._dd=colorFromSig(w.sig);
    w._color=DIM_COLORS[w._dd];
    w._angle=Math.atan2(p.y, p.x);
    w._mag=Math.sqrt(p.x*p.x+p.y*p.y);
    wordMap[w.w]=w;
  });

  // layout circolare
  if(N>1){
    const byMag=[...allWords].sort((a,b)=>a._mag-b._mag);
    byMag.forEach((w,i)=>{w._normR=0.12+(i/(N-1))*0.83;});
    const R=550;
    allWords.forEach(w=>{
      const rJitter=1+(Math.random()-0.5)*0.06;
      const r=w._normR*R*rJitter;
      w._px=Math.cos(w._angle)*r;
      w._py=Math.sin(w._angle)*r;
    });
  }

  // legenda dimensioni
  const dl=document.getElementById('dim-legend');
  DIM_NAMES.forEach((name,i)=>{
    dl.innerHTML+=`<div class="lr"><b style="background:${DIM_COLORS[i]}"></b>${name} <span style="color:#666;font-size:12px">(${DIM_DESC[i]} · ${DIM_ICHING[i]})</span></div>`;
  });

  buildGraph();

  // carica parole utente dal localStorage nel grafo (hidden nel vasto)
  userWords.forEach(uw=>{
    const sig=uw.sig||[50,50,50,50,50,50,50,50];
    const dd=colorFromSig(sig);
    const col=DIM_COLORS[dd];
    if(nodesDS.get(uw.w)){
      if(wordMap[uw.w]) wordMap[uw.w]._userWord=true;
      return;
    }
    const p=sigToXY(sig);
    const angle=Math.atan2(p.y,p.x);
    const R=550;
    const x=uw.x||Math.cos(angle)*R*0.45, y=uw.y||Math.sin(angle)*R*0.45;
    nodesDS.add({id:uw.w,label:'',x,y,fixed:true,hidden:true,
      size:10,color:{background:col,border:col},font:{size:14,color:'#fff'},opacity:0.92,borderWidth:1.5,_userWord:true});
    originalColors[uw.w]={background:col,border:col,size:10};
    wordMap[uw.w]={w:uw.w,sig,deg:0,_dd:dd,_color:col,_px:x,_py:y,s:50,_userWord:true,_userOct:uw.userOct||null};
    if(!wordEdgeIdx[uw.w]) wordEdgeIdx[uw.w]=[];
  });
  // carica relazioni utente
  userEdges.forEach(ue=>{
    const idx=allEdges.length;
    allEdges.push(ue);
    if(!wordEdgeIdx[ue.from]) wordEdgeIdx[ue.from]=[];
    wordEdgeIdx[ue.from].push(idx);
    if(!wordEdgeIdx[ue.to]) wordEdgeIdx[ue.to]=[];
    wordEdgeIdx[ue.to].push(idx);
    const g=REL_GROUP[ue.rel]||'L';
    try{edgesDS.add({id:idx+90000,from:ue.from,to:ue.to,hidden:true,
      color:{color:'#555',opacity:0.5},width:Math.max(0.5,(ue.conf||80)/100*2),
      dashes:GROUP_DASH[g]||false,arrows:{to:{enabled:true,scaleFactor:0.3}},font:{size:0},label:'',_userEdge:true});}catch(e){}
  });
}

/* ═══════════════════════════════════════
   BUILD GRAPH (once)
═══════════════════════════════════════ */
/* ═══════════════════════════════════════
   STILI NODO — 4 stati
═══════════════════════════════════════ */
function nodeDefault(id){
  const oc=originalColors[id]||{background:'#666',border:'#666',size:5};
  // ricalcola size in base al grado nel contesto corrente
  let sz=oc.size;
  const w=wordMap[id];
  if(w){
    if(viewMode==='vuoto'){
      // grado nel nuovo campo = solo archi user che coinvolgono questa parola
      const userDeg=userEdges.filter(e=>e.from===id||e.to===id).length;
      sz=Math.min(20,Math.max(6,4+Math.sqrt(userDeg)*2.5));
    } else {
      sz=Math.min(14,Math.max(3,2+Math.sqrt(w.deg||1)*0.5));
    }
  }
  return {id,label:'',color:{background:oc.background,border:oc.border},
    size:sz,font:{size:14,color:'#fff'},borderWidth:1.5,opacity:0.92};
}
function nodeActive(id){
  // colore E bordo = originale, solo size e font cambiano
  const oc=originalColors[id]||{background:'#666',border:'#666'};
  return {id,label:id,color:{background:oc.background,border:oc.background,highlight:{background:oc.background,border:oc.background}},
    size:18,font:{size:20,color:'#fff'},borderWidth:2.5,opacity:1};
}
function nodeRosa(id){
  const oc=originalColors[id]||{background:'#666',border:'#666'};
  return {id,label:id,color:{background:oc.background,border:oc.background,highlight:{background:oc.background,border:oc.background}},
    size:14,font:{size:18,color:'#fff'},borderWidth:1.5,opacity:1};
}
function nodeRosaDimmed(id){
  // rosa ma opacizzato (quando hover su un altro rosa)
  const oc=originalColors[id]||{background:'#666',border:'#666'};
  return {id,label:id,color:{background:oc.background,border:oc.border},
    size:14,font:{size:14,color:'rgba(255,255,255,0.4)'},borderWidth:0.8,opacity:0.15};
}
function nodeDimmed(id){
  const oc=originalColors[id]||{background:'#666',border:'#666'};
  return {id,label:'',color:{background:'#0f0f1a',border:oc.border},
    borderWidth:0.8,opacity:0.10};
}

/* ═══════════════════════════════════════
   ROSA — vicini diretti di un nodo
═══════════════════════════════════════ */
function isUserEdge(ae){
  return userEdges.some(ue=>ue===ae||(ue.from===ae.from&&ue.to===ae.to&&ue.rel===ae.rel));
}
function getRosa(word){
  const rosa=new Set();
  const userSet=viewMode==='vuoto'?new Set(userWords.map(u=>u.w)):null;
  (wordEdgeIdx[word]||[]).forEach(i=>{
    const ae=allEdges[i];if(!ae)return;
    // nel nuovo campo: solo archi creati dall'utente
    if(viewMode==='vuoto'&&!isUserEdge(ae)) return;
    const other=ae.from===word?ae.to:ae.from;
    // nel nuovo campo: solo se l'altra parola è user
    if(viewMode==='vuoto'&&!userSet.has(other)) return;
    if(nodesDS&&nodesDS.get(other)) rosa.add(other);
  });
  return rosa;
}

/* ═══════════════════════════════════════
   HIGHLIGHT / CLEAR — logica unica
═══════════════════════════════════════ */
function applyHighlight(activeWord, rosa){
  const batch=[];
  const userSet=new Set(userWords.map(u=>u.w));
  batch.push(nodeActive(activeWord));
  rosa.forEach(ww=>batch.push(nodeRosa(ww)));
  nodesDS.forEach(n=>{
    if(n.id===activeWord||rosa.has(n.id)) return;
    // nel campo vuoto, le parole utente restano visibili (dimmed ma non invisibili)
    if(viewMode==='vuoto'&&userSet.has(n.id)){
      const oc=originalColors[n.id]||{background:'#666',border:'#666'};
      batch.push({id:n.id,label:n.id,color:{background:oc.background,border:oc.border},opacity:0.4,borderWidth:1});
      return;
    }
    batch.push(nodeDimmed(n.id));
  });
  nodesDS.update(batch);
  const eids=wordEdgeIdx[activeWord]||[];
  const eUps=[];
  eids.forEach(i=>{
    const ae=allEdges[i];if(!ae)return;
    // nel nuovo campo: mostra SOLO archi user
    if(viewMode==='vuoto'&&!isUserEdge(ae)) return;
    // edge ID può essere i (campo) o i+90000 (user)
    const eid=edgesDS.get(i)?i:(i+90000);
    eUps.push({id:eid,hidden:false,color:{color:'#aaa',opacity:0.6},width:1.2});
  });
  if(eUps.length) edgesDS.update(eUps);
  currentRosa=rosa;
  isDimmed=true;
}

function clearHighlight(){
  // sempre nasconde archi e resetta nodi (anche se isDimmed=false)
  const userSet=viewMode==='vuoto'?new Set(userWords.map(u=>u.w)):null;
  const batch=[];
  nodesDS.forEach(n=>{
    if(userSet&&userSet.has(n.id)){
      // campo vuoto: parole utente restano visibili con label
      const oc=originalColors[n.id]||{background:'#666',border:'#666',size:10};
      batch.push({id:n.id,label:n.id,color:{background:oc.background,border:oc.border},
        size:oc.size,font:{size:14,color:'#fff'},borderWidth:1.5,opacity:0.92});
    } else {
      batch.push(nodeDefault(n.id));
    }
  });
  nodesDS.update(batch);
  // archi: tutti nascosti — visibili solo on hover (entrambi i campi)
  if(originalEdges.length) edgesDS.update(originalEdges);
  currentRosa=null;
  isDimmed=false;
}

/* ═══════════════════════════════════════
   BUILD GRAPH
═══════════════════════════════════════ */
function buildGraph() {
  const container=document.getElementById('graph');
  if(network) network.destroy();

  const nodes=allWords.map(w=>{
    const col=w._color||'#666';
    // cap: min 3, max 14 — mai coprire altri nodi
    const sz=Math.min(14, Math.max(3, 2+Math.sqrt(w.deg||1)*0.5));
    return {
      id:w.w, label:w.w,
      x:w._px, y:w._py, fixed:true,
      color:{background:col,border:col,highlight:{background:col,border:col},opacity:0.92},
      size:sz,
      label:'', // vuoto: label si vede solo su hover/focus (label:w.w viene ripristinato)
      font:{size:14, color:'#fff'},
    };
  });

  // archi: nascosti in vista globale, linee dritte (molto più veloce)
  const edges=allEdges.map((e,i)=>{
    const es=makeEdgeOpts(e.rel,e.conf);
    const cfg={id:i,from:e.from,to:e.to,
      color:{color:'#555',opacity:0.5,highlight:'#999'},
      width:Math.max(0.5,es.width*0.4),
      dashes:es.dashes||false,
      arrows:es.arrows,
      hidden:true, // nascosti in vista globale
      font:{size:0},label:''
    };
    return cfg;
  });

  // cache config originale archi per restore veloce
  originalEdges=edges.map(e=>({id:e.id,color:{...e.color},width:e.width,dashes:e.dashes,arrows:e.arrows,hidden:true,font:{size:0},label:''}));

  // indice inverso word → edge indices
  wordEdgeIdx={};
  allEdges.forEach((e,i)=>{
    if(!wordEdgeIdx[e.from]) wordEdgeIdx[e.from]=[];
    if(!wordEdgeIdx[e.to]) wordEdgeIdx[e.to]=[];
    wordEdgeIdx[e.from].push(i);
    wordEdgeIdx[e.to].push(i);
  });

  nodesDS=new vis.DataSet(nodes);
  edgesDS=new vis.DataSet(edges);

  network=new vis.Network(container,{nodes:nodesDS,edges:edgesDS},{
    physics:{enabled:false},
    interaction:{hover:true,tooltipDelay:50,hideEdgesOnDrag:false,navigationButtons:false,keyboard:false,zoomView:true,dragView:true},
    nodes:{shape:'dot',borderWidth:1.5},
    edges:{smooth:false,selectionWidth:2}, // linee dritte, non curve Bezier
  });
  network.fit();

  // salva stato originale per ogni nodo
  nodes.forEach(n=>{
    originalColors[n.id]={background:n.color.background,border:n.color.border,size:n.size};
  });

  // tooltip
  const hoverLabel=document.getElementById('hover-label');
  // subHoverWord è globale

  // === HOVER ===
  network.on('hoverNode',p=>{
    container.style.cursor='pointer';
    hoverLabel.textContent=p.node;
    hoverLabel.style.display='block';

    if(!selectedWord){
      // NESSUNA SELEZIONE: hover libero → mostra rosa
      hoveredWord=p.node;
      applyHighlight(p.node, getRosa(p.node));
    } else {
      // SELEZIONE ATTIVA: hover solo sui rosa → mostra sotto-rosa
      if(currentRosa && (currentRosa.has(p.node) || p.node===selectedWord)){
        if(p.node!==selectedWord){
          subHoverWord=p.node;
          const subRosa=getRosa(p.node);
          // il rosa hoverato + la sua sotto-rosa = piena opacità
          // il selectedWord = piena opacità
          // gli altri rosa = opacizzati (0.35)
          // il secondo piano resta dimmed (0.10)
          const batch=[];
          // sotto-rosa e nodo attivo
          batch.push(nodeActive(p.node));
          batch.push(nodeActive(selectedWord)); // selectedWord resta attivo
          subRosa.forEach(ww=>{
            if(ww===selectedWord) return;
            if(nodesDS.get(ww)) batch.push(nodeRosa(ww));
          });
          // gli altri rosa della selezione originale → opacizzati
          currentRosa.forEach(ww=>{
            if(ww===p.node||subRosa.has(ww)||ww===selectedWord) return;
            batch.push(nodeRosaDimmed(ww));
          });
          nodesDS.update(batch);
          // dim archi della selezione + mostra archi del sotto-hover (filtra per modalità)
          const selEids=(wordEdgeIdx[selectedWord]||[]).filter(i=>{
            const ae=allEdges[i];
            return ae && (viewMode!=='vuoto'||isUserEdge(ae));
          });
          edgesDS.update(selEids.map(i=>({id:i,hidden:false,color:{color:'#444',opacity:0.15},width:0.5})));
          const eids=(wordEdgeIdx[p.node]||[]).filter(i=>{
            const ae=allEdges[i];
            return ae && (viewMode!=='vuoto'||isUserEdge(ae));
          });
          edgesDS.update(eids.map(i=>({id:i,hidden:false,color:{color:'#aaa',opacity:0.5},width:1})));
        }
      }
    }
  });

  function restoreSelectionState(){
    // ripristina esattamente lo stato della selezione: active + rosa + dimmed
    if(!selectedWord||!currentRosa) return;
    subHoverWord=null;
    // nodi: rigenera TUTTO lo stato come se fosse appena cliccato
    const batch=[];
    batch.push(nodeActive(selectedWord));
    currentRosa.forEach(ww=>batch.push(nodeRosa(ww)));
    nodesDS.forEach(n=>{
      if(n.id===selectedWord||currentRosa.has(n.id)) return;
      batch.push(nodeDimmed(n.id));
    });
    nodesDS.update(batch);
    // archi: solo quelli della selezione (filtra per modalità)
    if(originalEdges.length) edgesDS.update(originalEdges);
    const eids=(wordEdgeIdx[selectedWord]||[]).filter(i=>{
      const ae=allEdges[i];
      return ae && (viewMode!=='vuoto'||isUserEdge(ae));
    });
    edgesDS.update(eids.map(i=>({id:i,hidden:false,color:{color:'#aaa',opacity:0.6},width:1.2})));
  }

  network.on('blurNode',()=>{
    container.style.cursor='default';
    hoverLabel.style.display='none';
    if(!selectedWord){
      hoveredWord=null;
      clearHighlight();
    } else if(subHoverWord){
      restoreSelectionState();
    }
  });

  container.addEventListener('mousemove',e=>{
    if(hoverLabel.style.display==='block'){
      hoverLabel.style.left=(e.clientX+14)+'px';
      hoverLabel.style.top=(e.clientY-14)+'px';
    }
  });
  container.addEventListener('mouseleave',()=>{
    hoverLabel.style.display='none';
    if(!selectedWord){hoveredWord=null;clearHighlight();}
    else if(subHoverWord) restoreSelectionState();
  });

  // === DRAG-TO-RELATE (solo campo vuoto) ===
  let dragFromNode=null;
  let dragFromPos=null;  // posizione originale per ripristinare
  let dragTempEdge=null; // edge temporaneo luminoso

  network.on('dragStart',p=>{
    if(viewMode!=='vuoto'||!p.nodes.length) return;
    dragFromNode=p.nodes[0];
    // salva posizione originale
    const pos=network.getPositions([dragFromNode])[dragFromNode];
    if(pos) dragFromPos={x:pos.x,y:pos.y};
    // crea edge luminoso temporaneo (da nodo a nodo fittizio che segue il cursore)
    try{
      nodesDS.add({id:'\x01',x:pos.x,y:pos.y,fixed:true,hidden:false,size:1,
        label:' ',font:{size:0,color:'rgba(0,0,0,0)',background:'rgba(0,0,0,0)'},
        color:{background:'rgba(0,0,0,0)',border:'rgba(0,0,0,0)'},
        borderWidth:0,opacity:0,chosen:false});
      edgesDS.add({id:'_drag_edge_',from:dragFromNode,to:'',
        color:{color:'#5AAFE8',opacity:0.8},width:2,dashes:[6,4],
        arrows:{to:{enabled:true,scaleFactor:0.4}},
        label:'',font:{size:0,color:'rgba(0,0,0,0)'}});
      dragTempEdge=true;
    }catch(e){}
  });

  network.on('dragging',p=>{
    if(!dragFromNode||!dragTempEdge) return;
    // sposta il nodo target fittizio verso il cursore
    const canvasPos=p.pointer.canvas;
    try{nodesDS.update({id:'\x01',x:canvasPos.x,y:canvasPos.y});}catch(e){}
    // ripristina il nodo originale alla sua posizione (non spostarlo)
    if(dragFromPos){
      try{nodesDS.update({id:dragFromNode,x:dragFromPos.x,y:dragFromPos.y});}catch(e){}
    }
  });

  network.on('dragEnd',p=>{
    if(!dragFromNode) return;
    const savedFrom=dragFromNode;
    // rimuovi edge e nodo fittizio
    try{edgesDS.remove('_drag_edge_');}catch(e){}
    try{nodesDS.remove('\x01');}catch(e){}
    dragTempEdge=null;

    // ripristina posizione originale del nodo trascinato
    if(dragFromPos){
      try{nodesDS.update({id:savedFrom,x:dragFromPos.x,y:dragFromPos.y});}catch(e){}
    }

    // trova nodo sotto il cursore (escludendo il nodo trascinato e il fittizio)
    const pos=p.pointer.DOM;
    const target=network.getNodeAt(pos);
    if(target&&target!==savedFrom&&target!=='\x01'){
      openAddRel();
      setTimeout(()=>{
        const f=document.getElementById('relFrom');
        const t=document.getElementById('relTo');
        if(f) f.value=savedFrom;
        if(t) t.value=target;
      },50);
    }
    dragFromNode=null;
    dragFromPos=null;
  });

  // === CLICK: seleziona (sticky) + sidebar ===
  network.on('click',p=>{
    if(p.nodes.length===0){
      if(selectedWord) deselectWord();
      return;
    }
    const nid=p.nodes[0];
    if(String(nid).startsWith('_')) return;
    // se è in secondo piano, ignora
    if(selectedWord && currentRosa && !currentRosa.has(nid) && nid!==selectedWord) return;
    // click su un rosa → diventa la nuova selezione
    selectWord(nid);
  });

  // === RIGHT-CLICK: select (come left) + context menu ===
  network.on('oncontext',p=>{
    p.event.preventDefault();
    const nid=network.getNodeAt(p.pointer.DOM);
    if(nid){
      selectWord(nid); // fissa il grafo come left-click
      openCtxMenu(nid, p.event.clientX||p.pointer.DOM.x, p.event.clientY||p.pointer.DOM.y);
    } else closeCtxMenu();
  });

  document.getElementById('stats').textContent=
    allWords.length.toLocaleString('it-IT')+' parole (su ~25.000 totali) · '+allEdges.length.toLocaleString('it-IT')+' relazioni';
}

/* ═══════════════════════════════════════
   SELECT / DESELECT — logica principale
═══════════════════════════════════════ */
let nbrCache={};

async function fetchWordData(word){
  if(nbrCache[word]) return nbrCache[word];
  try{
    const r=await fetch('/api/biennale/word?word='+encodeURIComponent(word));
    if(r.ok){const d=await r.json();nbrCache[word]=d;return d;}
  }catch(e){}
  return {word,firma:[.5,.5,.5,.5,.5,.5,.5,.5],neighbors:[]};
}

async function selectWord(word){
  // azzera stato precedente
  if(selectedWord) clearHighlight();
  subHoverWord=null;
  selectedWord=word;
  // inizializza _userOct se non esiste — così firma e octalysis sono indipendenti
  const ww=wordMap[word];
  if(ww&&!ww._userOct){
    ww._userOct=computeOctalysis(ww.sig||[50,50,50,50,50,50,50,50]).slice();
  }
  const rosa=getRosa(word);
  applyHighlight(word,rosa);
  document.getElementById('btn-home').style.display='inline-flex';

  // sidebar: fetch dati completi
  const data=await fetchWordData(word);
  const w=wordMap[word];
  const firma=data.firma||[.5,.5,.5,.5,.5,.5,.5,.5];
  const neighbors=data.neighbors||[];
  const dd=w?w._dd:0;
  const col=w?w._color:DIM_COLORS[dd];
  const sig100=w&&w.sig&&w.sig.length>=8?w.sig:firma.map(v=>Math.round(v*100));

  document.getElementById('info-content').innerHTML=
    `<div class="word-title" style="color:${col}">${esc(word)}</div>`;
  showDimBars(sig100);
  document.getElementById('dim-block').style.display='';
  drawRadar(sig100);
  document.getElementById('radar-block').style.display='';
}

function deselectWord(){
  selectedWord=null;
  clearHighlight();
  document.getElementById('btn-home').style.display='none';
  document.getElementById('info-content').innerHTML='<span class="word-empty">Cerca o clicca una parola</span>';
  document.getElementById('dim-block').style.display='none';
  document.getElementById('radar-block').style.display='none';
}

function goHome(){deselectWord();}
function goBack(){deselectWord();}


/* ═══════════════════════════════════════
   OCTALYSIS — calcolo client-side dalle 8 dimensioni
   dims: [agency, permanenza, intensità, tempo, confine, complessità, definizione, valenza]
═══════════════════════════════════════ */
const CD_NAMES=['significato','realizzazione','creatività','possesso','influenza','scarsità','curiosità','evitamento'];
const CD_COLORS=['#5AAFE8','#E89A3A','#4AC880','#E8D040','#E87AAA','#E04848','#A86EDB','#C8C4BC'];

function computeOctalysis(sig){
  // sig = [0..100] per le 8 dim: agency(0), permanenza(1), intensità(2), tempo(3), confine(4), complessità(5), definizione(6), valenza(7)
  const d=sig.map(v=>(v||0)/100);
  return [
    Math.sqrt(d[0]*d[1]),            // CD1: agency × permanenza
    Math.sqrt(d[2]*d[6]),            // CD2: intensità × definizione
    Math.sqrt(d[5]*d[0]),            // CD3: complessità × agency
    Math.sqrt(d[4]*d[1]),            // CD4: confine × permanenza
    Math.sqrt(d[7]*Math.max(0,1-d[4])), // CD5: valenza × (1-confine)
    Math.cbrt(d[3]*d[2]*Math.max(0,1-d[1])), // CD6: tempo × intensità × (1-permanenza)
    Math.sqrt(d[5]*Math.max(0,1-d[6])), // CD7: complessità × (1-definizione)
    Math.sqrt(Math.max(0,1-d[7])*Math.max(0,1-d[1])), // CD8: (1-valenza) × (1-permanenza)
  ];
}

/* ═══════════════════════════════════════
   SIDEBAR: bars + radar
═══════════════════════════════════════ */
const DIM_ICHING=['☰ cielo','☷ terra','☳ tuono','☵ acqua','☶ montagna','☴ vento','☲ fuoco','☱ lago'];
const DIM_DESC=['agisce o subisce','dura nel tempo','quanta energia','futuro o passato','dentro o fuori','semplice o complesso','chiaro o vago','attrae o respinge'];

function showDimBars(sig) {
  const el=document.getElementById('dim-bars');
  let html='';
  for(let i=0;i<8;i++){
    const v=sig[i]||0;
    html+=`<div class="dim-row"><span class="dim-name" style="color:${DIM_COLORS[i]}">${DIM_NAMES[i]}</span><div class="dim-bar-wrap" data-dim="${i}"><div class="dim-bar" style="width:${v}%;background:${DIM_COLORS[i]}"></div></div><span class="dim-val" id="dimval_${i}">${v}</span></div>`;
  }
  el.innerHTML=html;
  // attiva drag su ogni barra
  el.querySelectorAll('.dim-bar-wrap').forEach(wrap=>{
    let dragging=false;
    function setFromEvent(e){
      if(!selectedWord) return;
      const rect=wrap.getBoundingClientRect();
      const x=Math.max(0,Math.min(rect.width,e.clientX-rect.left));
      const v=Math.round((x/rect.width)*100);
      const dim=parseInt(wrap.dataset.dim);
      const w=wordMap[selectedWord];
      if(!w||!w.sig) return;
      w.sig[dim]=v;
      // aggiorna UI
      wrap.querySelector('.dim-bar').style.width=v+'%';
      wrap.querySelector('.dim-bar').style.background=DIM_COLORS[dim];
      document.getElementById('dimval_'+dim).textContent=v;
      // ricalcola colore + posizione del nodo
      w._dd=colorFromSig(w.sig);
      w._color=DIM_COLORS[w._dd];
      originalColors[selectedWord]={background:w._color,border:w._color,size:originalColors[selectedWord]?.size||10};
      // ricalcola posizione dalla nuova firma
      const pp=sigToXY(w.sig);
      const newAngle=Math.atan2(pp.y,pp.x);
      const newMag=Math.sqrt(pp.x*pp.x+pp.y*pp.y);
      const magsArr2=allWords.map(ww=>ww._mag||0).sort((a,b)=>a-b);
      let rk=magsArr2.findIndex(m=>m>=newMag);
      if(rk<0) rk=magsArr2.length;
      const normR2=0.12+(rk/Math.max(1,magsArr2.length-1))*0.83;
      const newX=Math.cos(newAngle)*normR2*550;
      const newY=Math.sin(newAngle)*normR2*550;
      w._angle=newAngle; w._mag=newMag; w._px=newX; w._py=newY;
      nodesDS.update({id:selectedWord,color:{background:w._color,border:w._color},x:newX,y:newY});
      // NON aggiornare il radar: Octalysis è indipendente dalla firma
      // salva in userWords se è una parola utente
      if(w._userWord){
        const uw=userWords.find(u=>u.w===selectedWord);
        if(uw){uw.sig=w.sig.slice();saveUserData();}
      }
    }
    wrap.addEventListener('mousedown',e=>{dragging=true;setFromEvent(e);});
    document.addEventListener('mousemove',e=>{if(dragging)setFromEvent(e);});
    document.addEventListener('mouseup',()=>{dragging=false;});
  });
}

function drawRadar(sig100) {
  // se la parola selezionata ha un Octalysis personalizzato (override), usa quello
  // altrimenti calcola dalla firma 8D
  let oct;
  if(selectedWord && wordMap[selectedWord]?._userOct){
    oct=wordMap[selectedWord]._userOct;
  } else {
    oct=computeOctalysis(sig100);
  }
  const c=document.getElementById('radar').getContext('2d');
  const W=340,H=340,cx=W/2,cy=H/2,R=100;
  const angles=CD_NAMES.map((_,i)=>(Math.PI*2/8)*i-Math.PI/2);
  c.clearRect(0,0,W,H);

  // griglia
  for(let r=0.25;r<=1;r+=0.25){
    c.beginPath();
    for(let i=0;i<=8;i++){const a=angles[i%8];i===0?c.moveTo(cx+Math.cos(a)*R*r,cy+Math.sin(a)*R*r):c.lineTo(cx+Math.cos(a)*R*r,cy+Math.sin(a)*R*r);}
    c.closePath();c.strokeStyle='rgba(255,255,255,0.08)';c.lineWidth=1;c.stroke();
  }
  // assi + label CD
  for(let i=0;i<8;i++){
    const a=angles[i];
    c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    c.strokeStyle='rgba(255,255,255,0.06)';c.stroke();
    c.font="500 11px -apple-system,sans-serif";c.textAlign='center';c.textBaseline='middle';
    c.fillStyle=CD_COLORS[i];
    c.fillText(CD_NAMES[i], cx+Math.cos(a)*(R+28), cy+Math.sin(a)*(R+28));
  }
  // poligono Octalysis
  c.beginPath();
  for(let i=0;i<8;i++){const a=angles[i],v=Math.min(1,oct[i]);const x=cx+Math.cos(a)*R*v,y=cy+Math.sin(a)*R*v;i===0?c.moveTo(x,y):c.lineTo(x,y);}
  c.closePath();
  c.fillStyle='rgba(90,175,232,0.18)';c.fill();
  c.strokeStyle='rgba(90,175,232,0.8)';c.lineWidth=2.5;c.stroke();
  // punti Octalysis + valori numerici (più grandi per drag)
  const radarPoints=[];
  for(let i=0;i<8;i++){
    const a=angles[i],v=Math.min(1,oct[i]);
    const px=cx+Math.cos(a)*R*v, py=cy+Math.sin(a)*R*v;
    radarPoints.push({i,px,py,v,a});
    c.beginPath();c.arc(px,py,7,0,Math.PI*2);c.fillStyle=CD_COLORS[i];c.fill();
    c.strokeStyle='#fff';c.lineWidth=1.5;c.stroke();
    const pct=Math.round(v*100);
    c.font='600 12px -apple-system,sans-serif';
    c.textAlign=Math.cos(a)>0.3?'left':Math.cos(a)<-0.3?'right':'center';
    c.textBaseline=Math.sin(a)>0.3?'top':'bottom';
    c.fillStyle='#fff';
    c.fillText(pct+'%', px+(Math.cos(a)>0.3?10:Math.cos(a)<-0.3?-10:0), py+(Math.sin(a)>0.3?10:-10));
  }
  // salva per drag
  drawRadar._points=radarPoints;
  drawRadar._oct=oct;
  drawRadar._sig=sig100;
}

// === RADAR DRAG — trascina punti per modificare Octalysis ===
(function(){
  const rc=document.getElementById('radar');
  let dragIdx=-1;
  const W=340,H=340,cx=W/2,cy=H/2,R=100;
  const angles=CD_NAMES.map((_,i)=>(Math.PI*2/8)*i-Math.PI/2);

  function canvasXY(e){
    const rect=rc.getBoundingClientRect();
    const scaleX=340/rect.width, scaleY=340/rect.height;
    return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
  }

  rc.addEventListener('mousedown',e=>{
    if(!selectedWord) return;
    const p=canvasXY(e);
    const pts=drawRadar._points;
    if(!pts) return;
    for(const pt of pts){
      if(Math.hypot(p.x-pt.px,p.y-pt.py)<12){dragIdx=pt.i;rc.style.cursor='grabbing';break;}
    }
  });

  rc.addEventListener('mousemove',e=>{
    if(dragIdx<0||!selectedWord) return;
    const p=canvasXY(e);
    const a=angles[dragIdx];
    // proietta posizione mouse sull'asse della dimensione
    const dx=p.x-cx, dy=p.y-cy;
    const proj=(dx*Math.cos(a)+dy*Math.sin(a))/R;
    const newV=Math.max(0,Math.min(1,proj));

    // modifica SOLO il valore Octalysis trascinato — niente firma, niente cascade
    const w=wordMap[selectedWord];
    if(!w) return;
    if(!w._userOct) w._userOct=computeOctalysis(w.sig||[50,50,50,50,50,50,50,50]).slice();
    w._userOct[dragIdx]=newV;

    // ridisegna solo il radar
    drawRadar(w.sig);
  });

  rc.addEventListener('mouseup',()=>{
    if(dragIdx<0) return;
    dragIdx=-1;
    rc.style.cursor='default';
    // salva _userOct nel localStorage se è una parola utente
    if(selectedWord){
      const w=wordMap[selectedWord];
      if(w&&w._userOct){
        const uw=userWords.find(u=>u.w===selectedWord);
        if(uw){uw.userOct=w._userOct.slice();saveUserData();}
      }
    }
  });

  rc.addEventListener('mouseleave',()=>{if(dragIdx>=0){dragIdx=-1;rc.style.cursor='default';}});
  rc.style.cursor='default';
})();

function deleteWord(word){
  if(selectedWord===word) deselectWord();
  // rimuovi nodo
  try{nodesDS.remove(word);}catch(e){}
  // rimuovi archi collegati
  const eids=wordEdgeIdx[word]||[];
  eids.forEach(i=>{try{edgesDS.remove(i);}catch(e){}});
  // pulisci dati
  delete wordMap[word];
  delete originalColors[word];
  delete wordEdgeIdx[word];
  allWords=allWords.filter(w=>w.w!==word);
  // rimuovi da userData
  userWords=userWords.filter(w=>w.w!==word);
  userEdges=userEdges.filter(e=>e.from!==word&&e.to!==word);
  saveUserData();
}

function deleteRelation(edgeIdx){
  const edge=allEdges[edgeIdx];
  if(!edge) return;
  // l'ID nel DataSet può essere edgeIdx (per archi del campo) o edgeIdx+90000 (per archi utente)
  try{edgesDS.remove(edgeIdx);}catch(e){}
  try{edgesDS.remove(edgeIdx+90000);}catch(e){}
  // cerca l'ID per from/to/rel se non trovato
  edgesDS.forEach(e=>{
    if(e.from===edge.from&&e.to===edge.to){
      try{edgesDS.remove(e.id);}catch(_){}
    }
  });
  // rimuovi dall'indice
  for(const w in wordEdgeIdx){
    wordEdgeIdx[w]=wordEdgeIdx[w].filter(i=>i!==edgeIdx);
  }
  // rimuovi da userEdges
  userEdges=userEdges.filter(e=>!(e.from===edge.from&&e.to===edge.to&&e.rel===edge.rel));
  saveUserData();
}

function deleteRelAndRefresh(edgeIdx,word){
  deleteRelation(edgeIdx);
  closeEdit();
  if(word&&nodesDS.get(word)){selectWord(word);setTimeout(()=>openEditRels(word),300);}
}

function openAddRelFor(word){
  // apri il pannello aggiungi relazione con "da" pre-compilato
  openAddRel();
  setTimeout(()=>{
    const el=document.getElementById('relFrom');
    if(el) el.value=word;
  },50);
}

function openEditDims(word){
  const w=wordMap[word];
  if(!w)return;
  const sig=w.sig||[50,50,50,50,50,50,50,50];
  let html=`<h3 style="color:${DIM_COLORS[w._dd]}">Dimensioni: ${esc(word)}</h3>`;
  for(let i=0;i<8;i++){
    html+=`<div class="edit-row"><label style="color:${DIM_COLORS[i]}">${DIM_NAMES[i]}</label><input type="range" min="0" max="100" value="${sig[i]||0}" data-dim="${i}" oninput="this.nextElementSibling.textContent=this.value"><span class="edit-val">${sig[i]||0}</span></div>`;
  }
  html+=`<div style="display:flex;gap:8px;margin-top:14px"><button class="edit-btn" onclick="applyEditDims('${esc(word)}')">applica</button><button class="edit-btn" onclick="closeEdit()">annulla</button></div>`;
  const panel=document.getElementById('editPanel');
  panel.innerHTML=html;panel.classList.add('open');
}

function applyEditDims(word){
  const w=wordMap[word];
  if(!w)return;
  const sliders=document.querySelectorAll('#editPanel input[type=range]');
  const newSig=[];
  sliders.forEach(s=>{newSig[parseInt(s.dataset.dim)]=parseInt(s.value);});
  w.sig=newSig;

  // ricalcola posizione dalla nuova firma (z-score → polar → percentile)
  const p=sigToXY(newSig);
  w._rx=p.x; w._ry=p.y;
  w._angle=Math.atan2(p.y,p.x);
  w._mag=Math.sqrt(p.x*p.x+p.y*p.y);
  // colore = dimensione più alta
  w._dd=colorFromSig(newSig);
  w._color=DIM_COLORS[w._dd];
  const newCol=w._color;
  originalColors[word]={background:newCol,border:newCol};

  // nuova posizione nel campo (rango percentile approssimato)
  const byMag=[...allWords].sort((a,b)=>a._mag-b._mag);
  const myRank=byMag.findIndex(ww=>ww.w===word);
  const normR=myRank>=0?0.12+(myRank/(allWords.length-1))*0.83:0.5;
  const R=550;
  const targetX=Math.cos(w._angle)*normR*R;
  const targetY=Math.sin(w._angle)*normR*R;
  w._px=targetX; w._py=targetY;

  // ANIMAZIONE fluida verso la nuova posizione (30 frame)
  const curPos=network.getPositions([word])[word]||{x:0,y:0};
  const startX=curPos.x, startY=curPos.y;
  nodesDS.update({id:word,color:{background:newCol,border:newCol}});
  let f=0;
  function moveStep(){
    f++;
    const t=f/30;
    const ease=1-Math.pow(1-t,3);
    nodesDS.update({id:word,x:startX+(targetX-startX)*ease,y:startY+(targetY-startY)*ease});
    if(f<30) requestAnimationFrame(moveStep);
  }
  requestAnimationFrame(moveStep);

  closeEdit();
  // aggiorna sidebar
  if(focusedWord===word){
    showDimBars(newSig);
    drawRadar(newSig);
  }
}

function openEditRels(word){

    const other=e.from===word?e.to:e.from;
    const dir=e.from===word?'→':'←';
    html+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #2a2a4e;font-size:13px">
      <span style="color:#888;width:14px">${dir}</span>

        ${relTypes.map(r=>`<option value="${r}"${e.rel===r?' selected':''}>${RL[r]}</option>`).join('')}
      </select>
      <input type="range" min="10" max="100" value="${e.conf||50}" style="width:50px;accent-color:#5AAFE8" data-cidx="${idx}">
      <span style="color:#666;font-size:11px;width:28px" id="rv_${idx}">${e.conf||50}%</span>
      <span style="color:#E04848;cursor:pointer;font-size:16px" onclick="deleteRelAndRefresh(${allEdges.indexOf(e)},'${esc(word)}')" title="elimina">✕</span>
    </div>`;
  });
  html+='</div>';
  html+=`<div style="margin-top:10px;border-top:1px solid #2a2a4e;padding-top:8px">
    <div style="font-size:12px;color:#666;margin-bottom:6px">AGGIUNGI RELAZIONE</div>
    <div style="display:flex;gap:4px;align-items:center">
      <input id="newRelWord" type="text" placeholder="parola" style="background:#0f0f1a;color:#ccc;border:1px solid #3a3a5e;font-size:13px;padding:4px 6px;width:90px;border-radius:3px">
      <select id="newRelType" style="background:#0f0f1a;color:#ccc;border:1px solid #3a3a5e;font-size:12px;padding:4px;width:74px">
        ${relTypes.map(r=>`<option value="${r}">${RL[r]}</option>`).join('')}
      </select>
      <button class="edit-btn" style="padding:4px 10px;font-size:12px;margin:0" onclick="addNewRel('${esc(word)}')">+</button>
    </div>
  </div>`;
  html+=`<div style="display:flex;gap:8px;margin-top:10px"><button class="edit-btn" onclick="applyEditRels('${esc(word)}')">applica</button><button class="edit-btn" onclick="closeEdit()">annulla</button></div>`;
  const panel=document.getElementById('editPanel');
  panel.innerHTML=html;panel.classList.add('open');
  // slider live update
  panel.querySelectorAll('input[type=range]').forEach(sl=>{
    sl.oninput=function(){document.getElementById('rv_'+this.dataset.cidx).textContent=this.value+'%';};
  });
}

function applyEditRels(word){
  const rels=allEdges.filter(e=>e.from===word||e.to===word).slice(0,15);
  const panel=document.getElementById('editPanel');
  panel.querySelectorAll('select[data-eidx]').forEach(sel=>{
    const idx=parseInt(sel.dataset.eidx);

function addNewRel(word){
  const target=document.getElementById('newRelWord').value.trim().toLowerCase();
  const rel=document.getElementById('newRelType').value;
  if(!target)return;
  const eid=allEdges.length;
  allEdges.push({from:word,to:target,rel,conf:80});
  // aggiorna indice
  if(!wordEdgeIdx[word])wordEdgeIdx[word]=[];
  wordEdgeIdx[word].push(eid);
  if(!wordEdgeIdx[target])wordEdgeIdx[target]=[];
  wordEdgeIdx[target].push(eid);
  // aggiungi arco visibile se in focus
  if(focusedWord===word){
    try{edgesDS.add({id:eid,from:word,to:target,hidden:false,_temp:true,
      color:{color:'#999',opacity:0.6},width:1.5,dashes:GROUP_DASH[REL_GROUP[rel]]||false,
      arrows:{to:{enabled:true,scaleFactor:0.3}},
      font:{size:10,color:'rgba(200,215,255,.35)',strokeWidth:0},label:RL[rel]||''});}catch(e){}
  }
  closeEdit();
  if(selectedWord===word) selectWord(word);
}

    ? allWords.filter(w=>userSet.has(w.w))

let viewMode='vasto'; // 'vasto' | 'vuoto'
let userWords=JSON.parse(localStorage.getItem('uir1_userWords')||'[]');
let userEdges=JSON.parse(localStorage.getItem('uir1_userEdges')||'[]');

function saveUserData(){
  localStorage.setItem('uir1_userWords',JSON.stringify(userWords));
  localStorage.setItem('uir1_userEdges',JSON.stringify(userEdges));
}

function setView(mode){
  viewMode=mode;
  document.getElementById('btnVasto').classList.toggle('active',mode==='vasto');
  document.getElementById('btnVuoto').classList.toggle('active',mode==='vuoto');
  document.getElementById('btnTransmit').style.display=mode==='vuoto'?'':'none';

  const userSet=new Set(userWords.map(u=>u.w));
  const transmitted=new Set((window._transmittedWords||[]).map(w=>w));

  if(mode==='vuoto'){
    const batch=[];
    nodesDS.forEach(n=>{
      if(userSet.has(n.id)) batch.push({id:n.id,hidden:false,...nodeDefault(n.id),label:n.id});
      else batch.push({id:n.id,hidden:true});
    });
    nodesDS.update(batch);
    // archi tutti nascosti — visibili solo on hover (come campo vasto)
    const allEdgeUps=[];
    edgesDS.forEach(e=>allEdgeUps.push({id:e.id,hidden:true}));
    if(allEdgeUps.length) edgesDS.update(allEdgeUps);
    if(userSet.size) network.fit({animation:{duration:400}});
  } else {
    // campo vasto: nascondi parole utente non trasmesse
    const batch=[];
    nodesDS.forEach(n=>{
      const w=wordMap[n.id];
      const isUserOnly=w&&w._userWord&&!transmitted.has(n.id);
      if(isUserOnly){
        batch.push({id:n.id,hidden:true});
      } else {
        batch.push({id:n.id,hidden:false,...nodeDefault(n.id)});
      }
    });
    nodesDS.update(batch);
    if(originalEdges.length) edgesDS.update(originalEdges);
    network.fit({animation:{duration:400}});
  }
  if(selectedWord) deselectWord();
}
// alias per backward compat
function toggleView(){setView(viewMode==='vasto'?'vuoto':'vasto');}

function updateOctPreview(){
  const sig=[];
  document.querySelectorAll('#editPanel .dim-slider').forEach(s=>{sig[parseInt(s.dataset.dim)]=parseInt(s.value);});
  const oct=computeOctalysis(sig);
  const el=document.getElementById('octPreview');

function doAddWord(){
  const word=document.getElementById('newWordInput').value.trim().toLowerCase();
  if(!word){closeEdit();return;}
  const sig=[];
  document.querySelectorAll('#editPanel .dim-slider').forEach(s=>{sig[parseInt(s.dataset.dim)]=parseInt(s.value);});

  // calcola posizione dalla firma con la stessa logica del campo vasto
  const p=sigToXY(sig);
  const angle=Math.atan2(p.y,p.x);
  const mag=Math.sqrt(p.x*p.x+p.y*p.y);
  const dd=colorFromSig(sig);
  const col=DIM_COLORS[dd];
  const R=550;
  // percentile della magnitudine vs tutte le altre parole esistenti
  const magsArr=allWords.map(w=>w._mag||0).sort((a,b)=>a-b);
  let rank=magsArr.findIndex(m=>m>=mag);
  if(rank<0) rank=magsArr.length;
  const normR=0.12+(rank/Math.max(1,magsArr.length-1))*0.83;
  const x=Math.cos(angle)*normR*R;
  const y=Math.sin(angle)*normR*R;

  // salva in localStorage
  userWords.push({w:word,sig,dd,col,x,y});
  saveUserData();

  // aggiungi al grafo — visibile SOLO nel campo vuoto, hidden nel vasto
  const isVuoto=viewMode==='vuoto';
  if(nodesDS.get(word)){
    nodesDS.update({id:word,color:{background:col,border:col},hidden:!isVuoto,label:isVuoto?word:''});
    originalColors[word]={background:col,border:col,size:10};
  } else {
    nodesDS.add({id:word,label:isVuoto?word:'',x,y,fixed:true,hidden:!isVuoto,
      size:10,color:{background:col,border:col},
      font:{size:14,color:'#fff'},opacity:1,borderWidth:1.5,_userWord:true});
    originalColors[word]={background:col,border:col,size:10};
    wordMap[word]={w:word,sig,deg:0,_dd:dd,_color:col,_px:x,_py:y,_mag:mag,_angle:angle,s:50,_userWord:true};
    if(!wordEdgeIdx[word]) wordEdgeIdx[word]=[];
    allWords.push(wordMap[word]);
  }

  closeEdit();
  if(isVuoto){
    network.focus(word,{scale:1.5,animation:{duration:600}});
  }
}

function openAddRel(){
  const panel=document.getElementById('editPanel');
  const relTypes=Object.keys(RL);
  let html=`<h3 style="color:#5AAFE8;font-size:16px">Aggiungi relazione</h3>`;
  html+=`<div class="edit-row"><label>da</label><input type="text" id="relFrom" style="flex:1;background:#0f0f1a;color:#ccc;border:1px solid #3a3a5e;padding:6px 8px;border-radius:3px;font-size:14px" placeholder="parola..."></div>`;
  html+=`<div class="edit-row"><label>tipo</label><select id="relType" style="flex:1;background:#0f0f1a;color:#ccc;border:1px solid #3a3a5e;padding:6px;font-size:13px">${relTypes.map(r=>'<option value="'+r+'">'+RL[r]+'</option>').join('')}</select></div>`;
  html+=`<div class="edit-row"><label>a</label><input type="text" id="relTo" style="flex:1;background:#0f0f1a;color:#ccc;border:1px solid #3a3a5e;padding:6px 8px;border-radius:3px;font-size:14px" placeholder="parola..."></div>`;
  html+=`<div class="edit-row"><label>forza</label><input type="range" id="relConf" min="10" max="100" value="80"><span class="edit-val">80</span></div>`;

function ensureUserNode(word){
  if(nodesDS.get(word)) return;
  const isVuoto=viewMode==='vuoto';
  const col='#888';
  const x=(Math.random()-0.5)*200, y=(Math.random()-0.5)*200;
  nodesDS.add({id:word,label:isVuoto?word:'',x,y,fixed:true,hidden:!isVuoto,
    size:8,color:{background:col,border:col},font:{size:14,color:'#fff'},opacity:1,borderWidth:1.5,_userWord:true});
  originalColors[word]={background:col,border:col,size:8};
  wordMap[word]={w:word,sig:[],deg:0,_dd:0,_color:col,_px:x,_py:y,s:50,_userWord:true};
  if(!wordEdgeIdx[word]) wordEdgeIdx[word]=[];
  // aggiungi a userWords se non c'è già
  if(!userWords.find(u=>u.w===word)){userWords.push({w:word,sig:[50,50,50,50,50,50,50,50],dd:0,col});saveUserData();}
}

function doAddRel(){
  const from=document.getElementById('relFrom').value.trim().toLowerCase();
  const to=document.getElementById('relTo').value.trim().toLowerCase();
  const rel=document.getElementById('relType').value;
  const conf=parseInt(document.getElementById('relConf').value);
  if(!from||!to){closeEdit();return;}

  // assicura che entrambi i nodi esistano
  ensureUserNode(from);
  ensureUserNode(to);

  const eid=allEdges.length+90000;
  const edge={from,to,rel,conf};
  userEdges.push(edge);
  allEdges.push(edge);
  saveUserData();

  // aggiorna indice
  const idx=allEdges.length-1;
  if(!wordEdgeIdx[from])wordEdgeIdx[from]=[];
  wordEdgeIdx[from].push(idx);
  if(!wordEdgeIdx[to])wordEdgeIdx[to]=[];
  wordEdgeIdx[to].push(idx);

  // aggiungi arco visibile (marca come _userEdge)
  const g=REL_GROUP[rel]||'L';
  const isVuoto=viewMode==='vuoto';
  try{edgesDS.add({id:eid,from,to,hidden:!isVuoto,
    color:{color:'#aaa',opacity:0.6},width:Math.max(1,(conf/100)*2.5),
    dashes:GROUP_DASH[g]||false,arrows:{to:{enabled:true,scaleFactor:0.3}},
    font:{size:0},label:'',_userEdge:true});}catch(e){}
  originalEdges.push({id:eid,hidden:true,color:{color:'#555',opacity:0.5},width:0.5,
    dashes:GROUP_DASH[g]||false,arrows:{to:{enabled:true,scaleFactor:0.3}},font:{size:0},label:''});

  closeEdit();
  if(isVuoto) network.fit({animation:{duration:400}});
}

/* ═══════════════════════════════════════
   TRASMETTI AL CAMPO GLOBALE
═══════════════════════════════════════ */
function transmitToGlobal(){
  if(!userWords.length&&!userEdges.length){
    alert('Nessuna parola o relazione da trasmettere.');return;
  }
  let added=0;

  // trasmetti parole: se già esistono nel campo, aggiorna colore; se no, crea nodo
  userWords.forEach(uw=>{
    const existing=wordMap[uw.w];
    if(existing){
      // aggiorna firma se l'utente l'ha modificata
      if(uw.sig&&uw.sig.length===8) existing.sig=uw.sig;
      existing._dd=colorFromSig(existing.sig);
      existing._color=DIM_COLORS[existing._dd];
      originalColors[uw.w]={background:existing._color,border:existing._color,size:originalColors[uw.w]?.size||10};
      nodesDS.update({id:uw.w,color:{background:existing._color,border:existing._color},hidden:false});
    } else {
      // crea nodo nel campo globale
      const sig=uw.sig||[50,50,50,50,50,50,50,50];
      const dd=colorFromSig(sig);
      const col=DIM_COLORS[dd];
      const p=sigToXY(sig);
      const angle=Math.atan2(p.y,p.x);
      const R=550;
      const x=Math.cos(angle)*R*0.45, y=Math.sin(angle)*R*0.45;
      nodesDS.add({id:uw.w,label:'',x,y,fixed:true,hidden:false,size:10,
        color:{background:col,border:col},font:{size:14,color:'#fff'},opacity:0.92,borderWidth:1.5});
      originalColors[uw.w]={background:col,border:col,size:10};
      wordMap[uw.w]={w:uw.w,sig,deg:0,_dd:dd,_color:col,_px:x,_py:y,s:50};
      if(!wordEdgeIdx[uw.w]) wordEdgeIdx[uw.w]=[];
      allWords.push(wordMap[uw.w]);
    }
    added++;
  });

  // trasmetti relazioni
  userEdges.forEach(ue=>{
    // controlla se esiste già
    const exists=allEdges.find(e=>e.from===ue.from&&e.to===ue.to&&e.rel===ue.rel);
    if(!exists){
      const idx=allEdges.length;
      allEdges.push(ue);
      if(!wordEdgeIdx[ue.from]) wordEdgeIdx[ue.from]=[];
      wordEdgeIdx[ue.from].push(idx);
      if(!wordEdgeIdx[ue.to]) wordEdgeIdx[ue.to]=[];
      wordEdgeIdx[ue.to].push(idx);
      const g=REL_GROUP[ue.rel]||'L';
      try{edgesDS.add({id:idx+90000,from:ue.from,to:ue.to,hidden:true,
        color:{color:'#555',opacity:0.5},width:Math.max(0.5,(ue.conf||80)/100*2),
        dashes:GROUP_DASH[g]||false,arrows:{to:{enabled:true,scaleFactor:0.3}},
        font:{size:0},label:''});}catch(e){}
      originalEdges.push({id:idx+90000,hidden:true,color:{color:'#555',opacity:0.5},width:0.5,
        dashes:GROUP_DASH[g]||false,arrows:{to:{enabled:true,scaleFactor:0.3}},font:{size:0},label:''});
      added++;
    }
  });

  // torna al campo vasto per mostrare il risultato
  if(viewMode==='vuoto') toggleView();
  // segna come trasmesse
  if(!window._transmittedWords) window._transmittedWords=[];
  userWords.forEach(uw=>window._transmittedWords.push(uw.w));
  alert('Trasmessi '+added+' elementi al campo globale.');
}

   BOOT

init().then(()=>{document.getElementById('btnVasto')?.classList.add('active');});
